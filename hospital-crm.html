<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinique The Grace of God - Système CRM</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.4/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ============================================================
   CLINIQUE THE GRACE OF GOD — DESIGN SYSTEM v2
   "Sauver des vies, gagner des âmes"
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box}
*:focus-visible{outline:2px solid var(--primary-400);outline-offset:2px;border-radius:4px}

:root{
  /* ----- PRIMARY (deep forest green — clinical / institutional) ----- */
  --primary-50:#eff4f2;--primary-100:#d8e5e0;--primary-200:#b1cbc1;--primary-300:#7eab9d;
  --primary-400:#4f8a78;--primary-500:#2e6e5a;--primary-600:#1f5747;
  --primary-700:#1a3c34;--primary-800:#142e28;--primary-900:#0c1f1a;
  --primary:#1a3c34;--primary-light:#2a5c4c;--secondary:#2e7d5b;--accent:#3a9d6e;

  /* ----- GOLD (warm sacred accent) ----- */
  --gold-50:#fbf7ee;--gold-100:#f4ead0;--gold-200:#e8d39d;--gold-300:#d9b566;
  --gold-400:#c89a3f;--gold-500:#b0822c;--gold-600:#8a6624;
  --gold:#9a7536;--gold-light:#f4ead0;

  /* ----- SEMANTIC ----- */
  --success-50:#e8f3ec;--success-100:#cfe6d6;--success-500:#2e8a5b;--success-600:#1d6d44;--success-700:#0e4a2c;
  --warning-50:#fbf2dc;--warning-100:#f5e2a8;--warning-500:#c08a1d;--warning-600:#8c6310;--warning-700:#5e4108;
  --danger-50:#fbe9e9;--danger-100:#f3c8c8;--danger-500:#b83230;--danger-600:#8c2422;--danger-700:#601817;
  --info-50:#e7eef8;--info-100:#c7d8ee;--info-500:#2563a8;--info-600:#1b4a83;--info-700:#0f315a;
  --warning:#c08a1d;--danger:#b83230;--info:#2563a8;

  /* ----- NEUTRALS ----- */
  --ink-900:#0c1816;--ink-800:#1a2823;--ink-700:#2a3a34;--ink-600:#3d524b;
  --ink-500:#5a6e67;--ink-400:#7d8d87;--ink-300:#a4b2ad;--ink-200:#c8d2ce;
  --ink-100:#e2e8e5;--ink-50:#eef1ef;--ink-25:#f6f8f7;

  --bg:#f3f5f3;--bg-subtle:#eaeeec;--surface:#ffffff;--surface-raised:#ffffff;
  --text:#142823;--text-light:#5a6e67;--text-muted:#7d8d87;
  --border:#dde3df;--border-strong:#c8d2ce;--border-subtle:#e8ede9;

  /* ----- TYPE SCALE ----- */
  --fs-xs:11px;--fs-sm:12px;--fs-md:13px;--fs-base:14px;--fs-lg:16px;--fs-xl:18px;
  --fs-2xl:22px;--fs-3xl:28px;--fs-4xl:36px;
  --lh-tight:1.2;--lh-snug:1.35;--lh-normal:1.55;--lh-relaxed:1.7;

  /* ----- SPACING (4px base) ----- */
  --s-1:4px;--s-2:8px;--s-3:12px;--s-4:16px;--s-5:20px;--s-6:24px;
  --s-7:32px;--s-8:40px;--s-9:48px;--s-10:64px;

  /* ----- RADIUS ----- */
  --r-xs:4px;--r-sm:6px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-2xl:20px;--r-full:9999px;
  --radius:8px;

  /* ----- ELEVATION (4 levels) ----- */
  --e-0:0 0 0 1px rgba(20,40,35,.06);
  --e-1:0 1px 2px rgba(20,40,35,.04),0 1px 3px rgba(20,40,35,.06);
  --e-2:0 2px 4px rgba(20,40,35,.04),0 4px 12px rgba(20,40,35,.08);
  --e-3:0 4px 8px rgba(20,40,35,.06),0 12px 28px rgba(20,40,35,.12);
  --e-4:0 8px 16px rgba(20,40,35,.08),0 24px 48px rgba(20,40,35,.16);
  --shadow:var(--e-1);--shadow-lg:var(--e-3);

  /* ----- MOTION ----- */
  --ease-out:cubic-bezier(.2,.7,.2,1);--ease-in-out:cubic-bezier(.4,0,.2,1);
  --dur-fast:120ms;--dur-base:180ms;--dur-slow:280ms;

  /* ----- LAYOUT ----- */
  --sidebar-w:248px;--sidebar-w-collapsed:64px;--topbar-h:56px;--content-max:1640px;
}

html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  font-size:var(--fs-md);line-height:var(--lh-normal);
  font-feature-settings:'cv02','cv03','cv04','cv11','ss01';
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}
input,select,textarea,button{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer}
h1,h2,h3,h4,h5,h6{font-weight:600;line-height:var(--lh-snug);color:var(--text);letter-spacing:-.01em}
h1{font-size:var(--fs-2xl);font-weight:700;letter-spacing:-.02em}
h2{font-size:var(--fs-xl)}
h3{font-size:var(--fs-lg)}
a{color:var(--primary-500);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:var(--gold-100);color:var(--primary-800)}

/* Subtle scrollbars */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink-200);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--ink-300);background-clip:padding-box;border:2px solid transparent}

/* ============================================================
   LOGIN
   ============================================================ */
.login-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 60% 50% at 80% -10%, rgba(154,117,54,.10), transparent 60%),
    radial-gradient(ellipse 60% 50% at -10% 110%, rgba(46,125,91,.12), transparent 60%),
    linear-gradient(180deg, #f3f5f3 0%, #eaeeec 100%);
  position:relative;overflow:hidden;padding:var(--s-4);
}
.login-page::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(var(--ink-100) 1px, transparent 1px),
    linear-gradient(90deg, var(--ink-100) 1px, transparent 1px);
  background-size:48px 48px;opacity:.35;
  mask-image:radial-gradient(ellipse at center, black 30%, transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse at center, black 30%, transparent 75%);
}
.login-page::after{
  content:'';position:absolute;width:520px;height:520px;left:50%;top:50%;
  transform:translate(-50%,-50%);pointer-events:none;opacity:.04;
  background:
    linear-gradient(var(--primary-700),var(--primary-700)) center/110px 28px no-repeat,
    linear-gradient(var(--primary-700),var(--primary-700)) center/28px 110px no-repeat;
}
.login-card{
  position:relative;z-index:1;background:var(--surface);
  border-radius:var(--r-xl);padding:var(--s-9) var(--s-8);width:440px;max-width:100%;
  box-shadow:var(--e-4);border:1px solid var(--border-subtle);
  animation:loginEntrance 600ms var(--ease-out);
}
@keyframes loginEntrance{
  from{opacity:0;transform:translateY(16px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.login-card .logo-area{text-align:center;margin-bottom:var(--s-7);padding-bottom:var(--s-6);border-bottom:1px solid var(--border-subtle)}
.login-card .logo-area .logo-fallback{
  width:72px;height:72px;border-radius:var(--r-lg);margin:0 auto var(--s-3);
  background:linear-gradient(135deg,var(--primary-700) 0%,var(--primary-500) 100%);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:32px;box-shadow:var(--e-2),inset 0 1px 0 rgba(255,255,255,.12);
}
.login-card .clinic-name{font-size:var(--fs-xl);font-weight:700;color:var(--primary-700);margin-top:var(--s-3);letter-spacing:-.01em}
.login-card .clinic-sub{font-size:10px;color:var(--gold-600);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:var(--s-1)}
.login-card .clinic-addr{color:var(--text-light);font-size:var(--fs-xs);margin-top:var(--s-2);display:flex;align-items:center;justify-content:center;gap:6px}

/* ============================================================
   FORMS
   ============================================================ */
.form-group{margin-bottom:var(--s-4)}
.form-group label{
  display:flex;align-items:center;gap:6px;
  font-weight:600;font-size:var(--fs-xs);color:var(--ink-500);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:var(--s-2);
}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:10px 12px;border:1px solid var(--border);
  border-radius:var(--r-md);font-size:var(--fs-base);background:var(--surface);color:var(--text);
  transition:border-color var(--dur-fast),box-shadow var(--dur-fast),background var(--dur-fast);
}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--ink-300)}
.form-group input:hover,.form-group select:hover,.form-group textarea:hover{border-color:var(--border-strong)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  outline:none;border-color:var(--primary-500);
  box-shadow:0 0 0 3px rgba(46,110,90,.14);
}
.form-group input:disabled,.form-group select:disabled,.form-group textarea:disabled{background:var(--ink-25);color:var(--text-muted);cursor:not-allowed}
.form-group textarea{resize:vertical;min-height:88px;line-height:var(--lh-normal)}
.form-group select{cursor:pointer;padding-right:30px;background:#fff;
  background-image:linear-gradient(45deg,transparent 50%,var(--ink-500) 50%),linear-gradient(135deg,var(--ink-500) 50%,transparent 50%);
  background-position:calc(100% - 16px) 50%,calc(100% - 11px) 50%;
  background-size:5px 5px,5px 5px;background-repeat:no-repeat;
  appearance:none;-webkit-appearance:none;-moz-appearance:none}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  padding:9px 16px;border-radius:var(--r-md);border:1px solid transparent;
  font-weight:600;font-size:var(--fs-md);cursor:pointer;
  transition:background var(--dur-fast),box-shadow var(--dur-fast),transform var(--dur-fast),border-color var(--dur-fast);
  display:inline-flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap;
  line-height:1;letter-spacing:-.005em;user-select:none;
}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;pointer-events:none}
.btn-primary{background:var(--primary-700);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),var(--e-1)}
.btn-primary:hover{background:var(--primary-600)}
.btn-success{background:var(--success-500);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),var(--e-1)}
.btn-success:hover{background:var(--success-600)}
.btn-danger{background:var(--danger-500);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.1),var(--e-1)}
.btn-danger:hover{background:var(--danger-600)}
.btn-warning{background:var(--warning-500);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.1),var(--e-1)}
.btn-warning:hover{background:var(--warning-600)}
.btn-gold{background:var(--gold);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.1),var(--e-1)}
.btn-gold:hover{background:var(--gold-600)}
.btn-outline{background:var(--surface);border-color:var(--border);color:var(--text)}
.btn-outline:hover{background:var(--ink-25);border-color:var(--border-strong)}
.btn-sm{padding:6px 12px;font-size:var(--fs-sm)}
.btn-lg{padding:12px 22px;font-size:var(--fs-base)}
.btn-block{width:100%;justify-content:center}
.btn i{font-size:.95em}
.btn.loading{opacity:.75;pointer-events:none;position:relative}

/* ============================================================
   LAYOUT (sidebar + topbar + content)
   ============================================================ */
.layout{display:flex;height:100vh;overflow:hidden;background:var(--bg)}

/* Sidebar */
.sidebar{
  width:var(--sidebar-w);background:linear-gradient(180deg,var(--primary-800) 0%,var(--primary-700) 60%,var(--primary-800) 100%);
  color:#fff;display:flex;flex-direction:column;flex-shrink:0;
  border-right:1px solid rgba(0,0,0,.2);position:relative;z-index:5;
}
.sidebar::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:1px;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.06) 30%,rgba(255,255,255,.06) 70%,transparent);
}
.sidebar-header{padding:var(--s-5) var(--s-5) var(--s-4);border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-header .brand{display:flex;align-items:center;gap:var(--s-3)}
.sidebar-header .brand-icon{
  width:40px;height:40px;border-radius:var(--r-md);
  background:linear-gradient(135deg,var(--gold-400),var(--gold-600));
  display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 2px 6px rgba(154,117,54,.3);
  flex-shrink:0;
}
.sidebar-header h2{font-size:var(--fs-base);font-weight:700;line-height:1.2;color:#fff;letter-spacing:-.01em}
.sidebar-header small{display:block;font-size:9.5px;color:rgba(255,255,255,.45);margin-top:3px;text-transform:uppercase;letter-spacing:1px;font-weight:600}

.sidebar-section-label{
  padding:var(--s-4) var(--s-5) var(--s-2);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.35);
}

.sidebar-nav{flex:1;padding:var(--s-3) var(--s-3);overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav-item{
  display:flex;align-items:center;gap:var(--s-3);padding:9px 12px;cursor:pointer;
  transition:background var(--dur-fast),color var(--dur-fast),transform var(--dur-fast);
  font-size:var(--fs-md);color:rgba(255,255,255,.62);
  border-radius:var(--r-md);position:relative;font-weight:500;
}
.nav-item i{width:18px;text-align:center;font-size:13px;opacity:.85}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item:hover i{opacity:1}
.nav-item.active{
  background:linear-gradient(90deg,rgba(58,157,110,.2) 0%,rgba(58,157,110,.08) 100%);
  color:#fff;font-weight:600;
}
.nav-item.active::before{
  content:'';position:absolute;left:-3px;top:50%;transform:translateY(-50%);
  width:3px;height:60%;background:var(--gold-400);border-radius:0 3px 3px 0;
  box-shadow:0 0 12px rgba(216,181,102,.6);
}
.nav-item.active i{color:var(--gold-300);opacity:1}
.nav-item .nav-badge{
  margin-left:auto;background:rgba(255,255,255,.14);color:#fff;
  padding:2px 8px;border-radius:var(--r-full);font-size:10px;font-weight:700;min-width:20px;text-align:center;
}
.nav-item.active .nav-badge{background:var(--gold-500);color:#fff}

.sidebar-footer{padding:var(--s-4) var(--s-5);border-top:1px solid rgba(255,255,255,.06)}
.sidebar-footer .user-info{display:flex;align-items:center;gap:var(--s-3)}
.sidebar-footer .avatar{
  width:36px;height:36px;border-radius:var(--r-md);
  background:linear-gradient(135deg,rgba(255,255,255,.16),rgba(255,255,255,.04));
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--fs-sm);
  color:#fff;border:1px solid rgba(255,255,255,.1);flex-shrink:0;
}
.sidebar-footer .user-details{font-size:var(--fs-xs);min-width:0;flex:1}
.sidebar-footer .user-details .name{font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-footer .user-details .role{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logout-btn{
  color:rgba(255,255,255,.5);cursor:pointer;font-size:var(--fs-xs);
  display:flex;align-items:center;gap:6px;margin-top:var(--s-3);
  transition:color var(--dur-fast);padding:6px 4px;border-radius:var(--r-sm);
}
.logout-btn:hover{color:#ff8888}

/* ----- TOP BAR ----- */
.content-shell{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{
  height:var(--topbar-h);background:var(--surface);
  border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;gap:var(--s-4);padding:0 var(--s-6);
  flex-shrink:0;position:relative;z-index:4;
}
.topbar-title{
  display:flex;flex-direction:column;gap:1px;min-width:0;
}
.topbar-title .crumb{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
.topbar-title .title{font-size:var(--fs-base);font-weight:600;color:var(--text);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-spacer{flex:1}
.topbar-clock{
  display:flex;align-items:center;gap:8px;padding:7px 12px;
  background:var(--ink-25);border:1px solid var(--border-subtle);border-radius:var(--r-md);
  font-size:var(--fs-sm);color:var(--text-light);font-variant-numeric:tabular-nums;font-weight:500;
}
.topbar-clock .dot{width:6px;height:6px;border-radius:50%;background:var(--success-500);box-shadow:0 0 0 3px rgba(46,138,91,.18);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.topbar-user{
  display:flex;align-items:center;gap:var(--s-3);padding:4px 6px 4px 4px;
  border-radius:var(--r-md);transition:background var(--dur-fast);
}
.topbar-user:hover{background:var(--ink-25)}
.topbar-user .avatar-circle{
  width:34px;height:34px;border-radius:var(--r-full);
  background:linear-gradient(135deg,var(--primary-600),var(--primary-700));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:var(--fs-sm);letter-spacing:.02em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
}
.topbar-user .info{display:flex;flex-direction:column;gap:0;min-width:0}
.topbar-user .info .nm{font-size:var(--fs-sm);font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap}
.topbar-user .info .rl{font-size:10px;color:var(--text-muted);line-height:1.2;white-space:nowrap}
.topbar-icon-btn{
  width:36px;height:36px;border-radius:var(--r-md);background:var(--ink-25);
  border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;
  color:var(--ink-500);cursor:pointer;transition:all var(--dur-fast);position:relative;
}
.topbar-icon-btn:hover{background:var(--ink-50);color:var(--text);border-color:var(--border-strong)}

/* ----- MAIN CONTENT ----- */
.main-content{
  flex:1;overflow-y:auto;padding:var(--s-7) var(--s-7) var(--s-9);background:var(--bg);
  scroll-behavior:smooth;contain:content;
}
.main-content > *{max-width:var(--content-max);margin-left:auto;margin-right:auto}
.page-header{
  margin-bottom:var(--s-6);display:flex;justify-content:space-between;align-items:flex-start;gap:var(--s-4);
  animation:fadeUp var(--dur-slow) var(--ease-out);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-header h1{font-size:var(--fs-3xl);font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.15}
.page-header p{color:var(--text-light);font-size:var(--fs-md);margin-top:var(--s-2);line-height:var(--lh-normal)}

/* ============================================================
   CARDS
   ============================================================ */
.card{
  background:var(--surface);border-radius:var(--r-lg);padding:var(--s-6);
  box-shadow:var(--e-1);margin-bottom:var(--s-4);
  border:1px solid var(--border-subtle);
  transition:box-shadow var(--dur-base),transform var(--dur-base),border-color var(--dur-base);
  animation:fadeUp var(--dur-slow) var(--ease-out);
}
.card:hover{box-shadow:var(--e-2);border-color:var(--border)}
.card h3{font-size:var(--fs-base);font-weight:600;margin-bottom:var(--s-3);color:var(--text);display:flex;align-items:center;gap:var(--s-2);letter-spacing:-.01em}
.card h3 i{color:var(--primary-500);font-size:.95em}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--s-4);gap:var(--s-4);flex-wrap:wrap}

/* ============================================================
   STATS
   ============================================================ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:var(--s-4);margin-bottom:var(--s-6)}
.stat-card{
  background:var(--surface);border-radius:var(--r-lg);padding:var(--s-5) var(--s-5) var(--s-4);
  box-shadow:var(--e-1);border:1px solid var(--border-subtle);
  position:relative;overflow:hidden;transition:transform var(--dur-base),box-shadow var(--dur-base);
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--e-2)}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--primary-500));
}
.stat-card.gold::before{background:linear-gradient(90deg,var(--gold-400),var(--gold-600))}
.stat-card.danger::before{background:linear-gradient(90deg,#d96363,var(--danger-500))}
.stat-card.info::before{background:linear-gradient(90deg,#4d8ec9,var(--info-500))}
.stat-card .stat-icon{
  width:40px;height:40px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;
  font-size:16px;margin-bottom:var(--s-3);
}
.stat-card .stat-icon.green{background:var(--success-50);color:var(--success-600)}
.stat-card .stat-icon.gold{background:var(--gold-100);color:var(--gold-600)}
.stat-card .stat-icon.red{background:var(--danger-50);color:var(--danger-600)}
.stat-card .stat-icon.blue{background:var(--info-50);color:var(--info-600)}
.stat-card .stat-value{font-size:var(--fs-3xl);font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.1;font-variant-numeric:tabular-nums}
.stat-card .stat-label{font-size:var(--fs-sm);color:var(--text-light);margin-top:var(--s-1);font-weight:500}
.stat-card .stat-trend{
  font-size:var(--fs-xs);margin-top:var(--s-3);padding-top:var(--s-3);
  border-top:1px solid var(--border-subtle);
  display:flex;align-items:center;gap:6px;color:var(--text-light);font-weight:500;
}
.stat-card .stat-trend.up{color:var(--success-600)}
.stat-card .stat-trend.down{color:var(--danger-500)}

/* ============================================================
   TABLE
   ============================================================ */
.card table,table{width:100%;border-collapse:separate;border-spacing:0}
th,td{padding:11px 14px;text-align:left;font-size:var(--fs-sm);vertical-align:middle}
th{
  background:var(--ink-25);font-weight:600;color:var(--text-light);
  font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;
  border-bottom:1px solid var(--border);border-top:1px solid var(--border-subtle);
  position:sticky;top:0;z-index:1;
}
th:first-child{border-top-left-radius:var(--r-md)}
th:last-child{border-top-right-radius:var(--r-md)}
td{border-bottom:1px solid var(--border-subtle);color:var(--text)}
tbody tr{transition:background var(--dur-fast)}
tbody tr:nth-child(even) td{background:var(--ink-25)}
tbody tr:hover td{background:var(--primary-50)}
tbody tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}

/* ============================================================
   BADGES
   ============================================================ */
.badge{
  padding:3px 9px;border-radius:var(--r-full);font-size:10.5px;font-weight:600;
  display:inline-flex;align-items:center;gap:4px;line-height:1.4;
  letter-spacing:.01em;white-space:nowrap;
}
.badge-green{background:var(--success-50);color:var(--success-700);box-shadow:inset 0 0 0 1px var(--success-100)}
.badge-yellow{background:var(--warning-50);color:var(--warning-700);box-shadow:inset 0 0 0 1px var(--warning-100)}
.badge-red{background:var(--danger-50);color:var(--danger-700);box-shadow:inset 0 0 0 1px var(--danger-100)}
.badge-blue{background:var(--info-50);color:var(--info-700);box-shadow:inset 0 0 0 1px var(--info-100)}
.badge-gold{background:var(--gold-100);color:var(--gold-600);box-shadow:inset 0 0 0 1px rgba(154,117,54,.18)}
.badge-purple{background:#efe9f7;color:#4a3080;box-shadow:inset 0 0 0 1px #d7c6f0}
.badge-new{
  background:linear-gradient(135deg,var(--accent),var(--primary-500));color:#fff;
  text-transform:uppercase;letter-spacing:.5px;font-size:9.5px;font-weight:700;
  box-shadow:0 1px 3px rgba(46,125,91,.3);
}
.badge-sm{padding:1.5px 7px;font-size:10px}

/* Insurance-specific colored badges (override default gold treatment with subtler distinction) */
.ins-regulier{background:var(--ink-50);color:var(--ink-700);box-shadow:inset 0 0 0 1px var(--ink-100)}
.ins-csu{background:#e7f1ec;color:#185a3c;box-shadow:inset 0 0 0 1px #c8e0d0}
.ins-academia{background:#e8eff8;color:#1c4e85;box-shadow:inset 0 0 0 1px #c8d8ec}
.ins-amc{background:#f3edd9;color:#7a5a10;box-shadow:inset 0 0 0 1px #e2d5a8}
.ins-activa{background:#f1e7f0;color:#673366;box-shadow:inset 0 0 0 1px #dec6dd}

/* ============================================================
   TABS
   ============================================================ */
.tabs{display:flex;gap:0;margin-bottom:var(--s-5);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{
  padding:10px 18px;cursor:pointer;font-weight:500;font-size:var(--fs-md);
  color:var(--text-light);border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all var(--dur-fast);white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.tab.active{color:var(--primary-700);border-bottom-color:var(--gold-400);font-weight:600}
.tab:hover:not(.active){color:var(--text)}

/* ============================================================
   PATIENT FLOW STEPPER
   ============================================================ */
.patient-flow{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:var(--s-3) 0 var(--s-2);padding:8px 12px;background:var(--ink-25);border-radius:var(--r-md);border:1px solid var(--border-subtle)}
.flow-step{
  position:relative;padding:5px 10px 5px 24px;font-size:10.5px;font-weight:600;
  color:var(--text-muted);background:transparent;display:flex;align-items:center;
  text-transform:none;letter-spacing:0;
}
.flow-step::before{
  content:'';position:absolute;left:6px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;border-radius:50%;background:var(--ink-100);
  border:2px solid var(--surface);box-shadow:inset 0 0 0 1px var(--border-strong);
  transition:all var(--dur-base);
}
.flow-step:not(:last-child)::after{
  content:'';position:absolute;right:-2px;top:50%;transform:translateY(-50%);
  width:8px;height:2px;background:var(--ink-100);
}
.flow-step.done{color:var(--success-600)}
.flow-step.done::before{background:var(--success-500);box-shadow:inset 0 0 0 2px var(--surface),0 0 0 1px var(--success-500)}
.flow-step.done:not(:last-child)::after{background:var(--success-500)}
.flow-step.current{color:var(--primary-700);font-weight:700}
.flow-step.current::before{
  background:var(--gold-400);box-shadow:inset 0 0 0 2px var(--surface),0 0 0 1px var(--gold-500),0 0 0 4px rgba(216,181,102,.25);
  animation:pulse-step 2s infinite;
}
@keyframes pulse-step{0%,100%{box-shadow:inset 0 0 0 2px var(--surface),0 0 0 1px var(--gold-500),0 0 0 4px rgba(216,181,102,.25)}50%{box-shadow:inset 0 0 0 2px var(--surface),0 0 0 1px var(--gold-500),0 0 0 7px rgba(216,181,102,.12)}}

/* ============================================================
   PATIENT AVATAR
   ============================================================ */
.p-avatar{
  width:42px;height:42px;border-radius:var(--r-full);display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:var(--fs-md);color:#fff;letter-spacing:.01em;flex-shrink:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
}
.p-avatar.male{background:linear-gradient(135deg,#3b6e9a,#2a527a)}
.p-avatar.female{background:linear-gradient(135deg,#b96894,#8a456e)}
.p-avatar.unk{background:linear-gradient(135deg,var(--ink-400),var(--ink-500))}
.p-avatar.sm{width:32px;height:32px;font-size:var(--fs-xs)}
.p-avatar.lg{width:56px;height:56px;font-size:var(--fs-xl)}
.p-headline{display:flex;align-items:center;gap:var(--s-3)}
.p-headline .p-name{font-weight:600;font-size:var(--fs-lg);color:var(--text);letter-spacing:-.01em}
.p-headline .p-meta{font-size:var(--fs-xs);color:var(--text-muted);margin-top:2px}

/* ============================================================
   STOCK
   ============================================================ */
.stock-low{color:var(--danger-600);font-weight:600}
.stock-ok{color:var(--success-600);font-weight:500}
.stock-bar{height:6px;border-radius:var(--r-full);background:var(--ink-100);overflow:hidden;width:90px;display:inline-block;vertical-align:middle;margin-left:8px}
.stock-bar-fill{height:100%;border-radius:var(--r-full);transition:width var(--dur-slow)}

/* ============================================================
   CONFIDENTIAL NOTE
   ============================================================ */
.confidential-note{
  background:linear-gradient(180deg,#fbf6ec 0%,#f8f0db 100%);
  border:1px solid #e8d8b8;border-left:3px solid var(--gold-500);
  border-radius:var(--r-md);padding:var(--s-4);margin:var(--s-2) 0;position:relative;
}
.confidential-note::before{
  content:"CONFIDENTIEL · Medecin + Admin";font-weight:700;
  font-size:9.5px;color:var(--gold-600);text-transform:uppercase;letter-spacing:1.2px;
  display:flex;align-items:center;gap:6px;margin-bottom:var(--s-2);
  padding-bottom:var(--s-2);border-bottom:1px dashed #e0c898;
}

/* ============================================================
   FILTERS
   ============================================================ */
.filter-bar{
  display:flex;gap:var(--s-3);margin-bottom:var(--s-4);flex-wrap:wrap;align-items:center;
  padding:var(--s-3) var(--s-4);background:var(--surface);border-radius:var(--r-md);
  border:1px solid var(--border-subtle);
}
.filter-bar select,.filter-bar input{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r-md);font-size:var(--fs-sm);background:var(--surface);color:var(--text);transition:all var(--dur-fast)}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--primary-500);box-shadow:0 0 0 3px rgba(46,110,90,.12)}

/* ============================================================
   AI ASSISTANT
   ============================================================ */
.ai-fab{
  position:fixed;width:52px;height:52px;border-radius:var(--r-full);
  background:linear-gradient(135deg,var(--primary-600),var(--primary-800));
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;
  cursor:grab;box-shadow:var(--e-3),inset 0 1px 0 rgba(255,255,255,.12);
  z-index:999;user-select:none;transition:transform var(--dur-base),box-shadow var(--dur-base);
}
.ai-fab:hover{transform:scale(1.05);box-shadow:var(--e-4),inset 0 1px 0 rgba(255,255,255,.12)}
.ai-fab:active{cursor:grabbing}
.ai-panel{
  position:fixed;bottom:80px;right:24px;width:380px;max-height:520px;
  background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--e-4);
  z-index:998;display:flex;flex-direction:column;overflow:hidden;
  border:1px solid var(--border-subtle);animation:fadeUp var(--dur-base) var(--ease-out);
}
.ai-panel-header{
  padding:var(--s-4) var(--s-5);background:linear-gradient(135deg,var(--primary-700),var(--primary-800));
  color:#fff;font-weight:600;display:flex;justify-content:space-between;align-items:center;font-size:var(--fs-base);
}
.ai-panel-body{flex:1;overflow-y:auto;padding:var(--s-4);max-height:340px;background:var(--ink-25)}
.ai-panel-input{padding:var(--s-3);border-top:1px solid var(--border-subtle);display:flex;gap:var(--s-2);background:var(--surface)}
.ai-panel-input input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);font-size:var(--fs-md)}
.ai-panel-input input:focus{outline:none;border-color:var(--primary-500);box-shadow:0 0 0 3px rgba(46,110,90,.12)}
.ai-msg{margin-bottom:var(--s-2);padding:10px 14px;border-radius:var(--r-md);font-size:var(--fs-md);max-width:85%;line-height:var(--lh-normal)}
.ai-msg.user{background:var(--primary-600);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.ai-msg.bot{background:var(--surface);color:var(--text);box-shadow:var(--e-1);border:1px solid var(--border-subtle);border-bottom-left-radius:4px}

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(12,24,22,.55);backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:var(--s-4);animation:fadeIn var(--dur-base) var(--ease-out);
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border-radius:var(--r-xl);padding:var(--s-7);width:560px;max-width:100%;
  max-height:90vh;overflow-y:auto;box-shadow:var(--e-4);border:1px solid var(--border-subtle);
  animation:modalIn var(--dur-base) var(--ease-out);
}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal h2{font-size:var(--fs-xl);font-weight:700;margin-bottom:var(--s-5);color:var(--text);display:flex;align-items:center;gap:var(--s-2)}
.modal h2 i{color:var(--primary-500)}

/* ============================================================
   WELCOME BANNER (admin dashboard)
   ============================================================ */
.welcome-banner{
  background:linear-gradient(135deg,var(--primary-700) 0%,var(--primary-800) 60%,var(--primary-900) 100%);
  border-radius:var(--r-lg);padding:var(--s-6) var(--s-7);color:#fff;
  margin-bottom:var(--s-6);position:relative;overflow:hidden;
}
.welcome-banner h2{font-size:var(--fs-xl);font-weight:600;margin-bottom:var(--s-1)}
.welcome-banner p{opacity:.7;font-size:var(--fs-sm)}

/* ============================================================
   NOTIFICATIONS
   ============================================================ */
.notif-bell{position:relative;cursor:pointer;padding:7px 11px;border-radius:var(--r-md);transition:all var(--dur-fast)}
.notif-bell:hover{background:var(--ink-50)}
.notif-bell .notif-count{
  position:absolute;top:1px;right:1px;background:var(--danger-500);color:#fff;
  font-size:9.5px;font-weight:700;min-width:17px;height:17px;border-radius:var(--r-full);
  display:flex;align-items:center;justify-content:center;padding:0 4px;
  box-shadow:0 0 0 2px var(--surface);
}
.notif-panel{
  position:absolute;top:calc(100% + 8px);right:0;width:380px;max-height:480px;
  background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--e-4);
  z-index:1100;overflow:hidden;border:1px solid var(--border-subtle);
  animation:fadeUp var(--dur-base) var(--ease-out);display:flex;flex-direction:column;
}
.notif-panel-header{
  padding:var(--s-4) var(--s-5);background:var(--surface);
  border-bottom:1px solid var(--border-subtle);display:flex;justify-content:space-between;
  align-items:center;font-weight:700;font-size:var(--fs-base);color:var(--text);
}
.notif-panel-body{max-height:400px;overflow-y:auto;background:var(--ink-25)}
.notif-item{
  padding:var(--s-3) var(--s-5);border-bottom:1px solid var(--border-subtle);
  cursor:pointer;transition:background var(--dur-fast);font-size:var(--fs-sm);background:var(--surface);
}
.notif-item:hover{background:var(--ink-25)}
.notif-item.unread{background:var(--primary-50);border-left:3px solid var(--accent);padding-left:calc(var(--s-5) - 3px)}
.notif-item .notif-time{font-size:10px;color:var(--text-muted);margin-top:4px;display:flex;align-items:center;gap:4px}
.notif-item .notif-icon{
  display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;
  border-radius:var(--r-full);margin-right:10px;font-size:12px;flex-shrink:0;
}

/* ============================================================
   PATIENT DOSSIER (medical chart modal)
   ============================================================ */
.dossier-overlay{
  position:fixed;inset:0;background:rgba(12,24,22,.6);backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);z-index:1200;display:flex;align-items:center;justify-content:center;
  padding:var(--s-4);animation:fadeIn var(--dur-base) var(--ease-out);
}
.dossier-panel{
  background:var(--surface);width:880px;max-width:100%;max-height:92vh;
  border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--e-4);
  display:flex;flex-direction:column;animation:modalIn var(--dur-base) var(--ease-out);
}
.dossier-header{
  padding:var(--s-5) var(--s-6);
  background:linear-gradient(135deg,var(--primary-700),var(--primary-800));
  color:#fff;display:flex;justify-content:space-between;align-items:center;gap:var(--s-4);
}
.dossier-header h2{font-size:var(--fs-xl);font-weight:700;margin:0;display:flex;align-items:center;gap:var(--s-2)}
.dossier-header .close-x{cursor:pointer;width:32px;height:32px;border-radius:var(--r-full);background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;transition:background var(--dur-fast)}
.dossier-header .close-x:hover{background:rgba(255,255,255,.2)}

.dossier-tabs{
  display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 var(--s-6);gap:0;overflow-x:auto;flex-shrink:0;
}
.dossier-tab{
  padding:13px 18px;cursor:pointer;font-size:var(--fs-sm);font-weight:600;
  color:var(--text-light);border-bottom:2px solid transparent;
  transition:all var(--dur-fast);display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.dossier-tab:hover{color:var(--text)}
.dossier-tab.active{color:var(--primary-700);border-bottom-color:var(--gold-400)}
.dossier-tab .ct{background:var(--ink-100);color:var(--text-light);padding:1px 7px;border-radius:var(--r-full);font-size:10px;font-weight:700}
.dossier-tab.active .ct{background:var(--gold-100);color:var(--gold-600)}

.dossier-body{flex:1;overflow-y:auto;padding:var(--s-6);background:var(--ink-25)}
.dossier-section{
  margin-bottom:var(--s-5);background:var(--surface);border-radius:var(--r-lg);
  padding:var(--s-5);border:1px solid var(--border-subtle);
}
.dossier-section h4{
  font-size:var(--fs-xs);font-weight:700;color:var(--primary-700);
  text-transform:uppercase;letter-spacing:1.2px;margin-bottom:var(--s-4);
  padding-bottom:var(--s-3);border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;gap:var(--s-2);
}
.dossier-section h4 i{color:var(--gold-500);font-size:13px}

/* Mini vital gauge cards (used in dossier vitals section) */
.vital-gauge{
  background:linear-gradient(180deg,var(--ink-25),var(--surface));
  border:1px solid var(--border-subtle);border-radius:var(--r-md);
  padding:var(--s-3);text-align:center;position:relative;overflow:hidden;
}
.vital-gauge .vlabel{font-size:10px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:6px}
.vital-gauge .vlabel i{color:var(--primary-500);font-size:11px}
.vital-gauge .vvalue{font-size:var(--fs-xl);font-weight:700;color:var(--text);line-height:1.1;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.vital-gauge .vunit{font-size:11px;color:var(--text-muted);font-weight:500;margin-left:2px}

/* Timeline */
.timeline-item{
  position:relative;padding:10px 0 14px 30px;border-left:2px solid var(--border);
  margin-left:10px;
}
.timeline-item:last-child{border-left-color:transparent}
.timeline-item::before{
  content:'';position:absolute;left:-7px;top:14px;width:12px;height:12px;border-radius:50%;
  background:var(--accent);border:3px solid var(--surface);
  box-shadow:0 0 0 1px var(--accent);
}
.timeline-item.lab::before{background:var(--info-500);box-shadow:0 0 0 1px var(--info-500)}
.timeline-item.payment::before{background:var(--gold-500);box-shadow:0 0 0 1px var(--gold-500)}
.timeline-item.rx::before{background:var(--warning-500);box-shadow:0 0 0 1px var(--warning-500)}
.timeline-item.note::before{background:var(--danger-500);box-shadow:0 0 0 1px var(--danger-500)}

/* ============================================================
   TOAST
   ============================================================ */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{
  pointer-events:auto;padding:12px 16px 12px 14px;border-radius:var(--r-md);
  font-size:var(--fs-md);font-weight:500;color:#fff;
  box-shadow:var(--e-3);display:flex;align-items:center;gap:10px;
  animation:toastIn var(--dur-slow) var(--ease-out);max-width:420px;
  line-height:var(--lh-snug);border:1px solid rgba(255,255,255,.12);
  backdrop-filter:saturate(120%);min-width:280px;
}
.toast.success{background:linear-gradient(135deg,var(--success-500),var(--success-600))}
.toast.error{background:linear-gradient(135deg,#c54a48,var(--danger-600))}
.toast.info{background:linear-gradient(135deg,#3577b8,var(--info-600))}
.toast.warning{background:linear-gradient(135deg,#c89a3f,var(--warning-600))}
.toast i:first-child{font-size:16px;flex-shrink:0;opacity:.95}
.toast-close{margin-left:auto;cursor:pointer;opacity:.7;font-size:18px;padding:0 4px;line-height:1;font-weight:300}
.toast-close:hover{opacity:1}
@keyframes toastIn{
  from{transform:translateX(110%) scale(.96);opacity:0}
  to{transform:translateX(0) scale(1);opacity:1}
}

/* ============================================================
   CONFIRM
   ============================================================ */
.confirm-overlay{position:fixed;inset:0;background:rgba(12,24,22,.5);backdrop-filter:blur(4px);z-index:9998;display:flex;align-items:center;justify-content:center}

function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const addToast=(message,type='success',duration=4000)=>{
    const id=Date.now()+Math.random();
    setToasts(prev=>[...prev,{id,message,type}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),duration);
  };
  const removeToast=(id)=>setToasts(prev=>prev.filter(t=>t.id!==id));
  const toast={success:(msg)=>addToast(msg,'success'),error:(msg)=>addToast(msg,'error',6000),info:(msg)=>addToast(msg,'info'),warning:(msg)=>addToast(msg,'warning',5000)};
  return React.createElement(ToastContext.Provider,{value:toast},
    children,
    React.createElement('div',{className:'toast-container'},
      toasts.map(t=>React.createElement('div',{key:t.id,className:`toast ${t.type}`},
        React.createElement('i',{className:`fas ${t.type==='success'?'fa-check-circle':t.type==='error'?'fa-exclamation-circle':t.type==='warning'?'fa-exclamation-triangle':'fa-info-circle'}`}),
        React.createElement('span',null,t.message),
        React.createElement('span',{className:'toast-close',onClick:()=>removeToast(t.id)},'×')
      ))
    )
  );
}

  },[user]);
  useEffect(()=>{
    if(!user) return;
    resetSessionTimer();
    const events=['mousedown','keydown','scroll','touchstart'];
    events.forEach(e=>window.addEventListener(e,resetSessionTimer));
    return()=>events.forEach(e=>window.removeEventListener(e,resetSessionTimer));

      await supabase.from('notifications').insert({

    if (!user) return;
    async function loadData() {
      setLoading(true);
      try {
        // Load patients with their latest vitals
        const { data: pData } = await supabase.from('patients').select('*').order('registered_at', { ascending: false });
        if (pData) {
          const patientsWithVitals = await Promise.all(pData.map(async (p) => {
            const { data: vData } = await supabase.from('vitals').select('*').eq('patient_id', p.id).order('recorded_at', { ascending: false }).limit(1);
            const vitals = vData && vData.length > 0 ? vData[0] : null;
            return {
              ...p,
              registeredAt: p.registered_at,

              stepLabel: p.step_label,
              isNew: p.is_new,

              payments: [],
              labResults: [],
              prescriptions: []
            };
          }));
          setPatients(patientsWithVitals);
        }

        // Load payments
        const { data: payData } = await supabase.from('payments').select('*').order('date', { ascending: false });
        if (payData) setPayments(payData.map(p => ({ ...p, patientId: p.patient_id, patientName: p.patient_name, processedBy: p.processed_by })));

        // Load lab orders
        const { data: labData } = await supabase.from('lab_orders').select('*').order('date', { ascending: false });
        if (labData) setLabOrders(labData.map(l => ({ ...l, patientId: l.patient_id, patientName: l.patient_name, orderedBy: l.ordered_by, completedAt: l.completed_at, completedBy: l.completed_by })));

        // Load prescriptions
        const { data: rxData } = await supabase.from('prescriptions').select('*').order('date', { ascending: false });
        if (rxData) setPrescriptions(rxData.map(r => ({ ...r, patientId: r.patient_id, patientName: r.patient_name, prescribedBy: r.prescribed_by, dispensedAt: r.dispensed_at })));

        // Load confidential notes
        const { data: noteData } = await supabase.from('confidential_notes').select('*').order('date', { ascending: false });
        if (noteData) setConfidentialNotes(noteData.map(n => ({ ...n, patientId: n.patient_id, patientName: n.patient_name, doctorId: n.doctor_id, doctorName: n.doctor_name })));

        // Load inventory
        const { data: invData } = await supabase.from('inventory').select('*').order('name');
        if (invData) setInventory(invData.map(m => ({ ...m, minStock: m.min_stock, lastRestock: m.last_restock })));

        // Load notifications
        try {
          const { data: notifData } = await supabase.from('notifications').select('*').order('created_at', { ascending: false }).limit(50);
          if (notifData) setNotifications(notifData.map(n => ({ ...n, patientId: n.patient_id, patientName: n.patient_name, forDoctorId: n.for_doctor_id, forDoctorName: n.for_doctor_name, fromUser: n.from_user, createdAt: n.created_at })));
        } catch(e) { console.log('Notifications table not yet created:', e); }

      } catch (err) {
        console.error('Error loading data:', err);
        toast.error('Erreur de chargement des données. Vérifiez votre connexion internet.');
      }
      setLoading(false);
    }
    loadData();

    // ===== REAL-TIME SUBSCRIPTIONS (multi-device sync) =====
    const mapPatient = (p) => ({ ...p, registeredAt: p.registered_at, registeredBy: p.registered_by, stepLabel: p.step_label, isNew: p.is_new, doctorId: p.doctor_id||null, doctorName: p.doctor_name||null, vitals: null, payments: [], labResults: [], prescriptions: [] });
    const mapPayment = (p) => ({ ...p, patientId: p.patient_id, patientName: p.patient_name, processedBy: p.processed_by });
    const mapLab = (l) => ({ ...l, patientId: l.patient_id, patientName: l.patient_name, orderedBy: l.ordered_by, completedAt: l.completed_at, completedBy: l.completed_by });
    const mapRx = (r) => ({ ...r, patientId: r.patient_id, patientName: r.patient_name, prescribedBy: r.prescribed_by, dispensedAt: r.dispensed_at });
    const mapNotif = (n) => ({ ...n, patientId: n.patient_id, patientName: n.patient_name, forDoctorId: n.for_doctor_id, forDoctorName: n.for_doctor_name, fromUser: n.from_user, createdAt: n.created_at });

    const channel = supabase.channel('crm-realtime')
      // Patients: INSERT and UPDATE
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'patients' }, (payload) => {
        const p = mapPatient(payload.new);
        setPatients(prev => prev.some(x=>x.id===p.id) ? prev : [p, ...prev]);
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'patients' }, (payload) => {
        const p = payload.new;
        setPatients(prev => prev.map(x => x.id===p.id ? { ...x, step: p.step, stepLabel: p.step_label, insurance: p.insurance, diagnosis: p.diagnosis, isNew: p.is_new, doctorId: p.doctor_id||null, doctorName: p.doctor_name||null, nom: p.nom, prenom: p.prenom, phone: p.phone, email: p.email, adresse: p.adresse, langue: p.langue, sexe: p.sexe } : x));
      })
      // Payments
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'payments' }, (payload) => {
        const p = mapPayment(payload.new);
        setPayments(prev => prev.some(x=>x.id===p.id) ? prev : [p, ...prev]);
      })
      // Lab orders
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'lab_orders' }, (payload) => {
        const l = mapLab(payload.new);
        setLabOrders(prev => prev.some(x=>x.id===l.id) ? prev : [l, ...prev]);
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'lab_orders' }, (payload) => {
        const l = mapLab(payload.new);
        setLabOrders(prev => prev.map(x => x.id===l.id ? l : x));
      })
      // Prescriptions
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'prescriptions' }, (payload) => {
        const r = mapRx(payload.new);
        setPrescriptions(prev => prev.some(x=>x.id===r.id) ? prev : [r, ...prev]);
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'prescriptions' }, (payload) => {
        const r = mapRx(payload.new);
        setPrescriptions(prev => prev.map(x => x.id===r.id ? r : x));
      })
      // Confidential notes
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'confidential_notes' }, (payload) => {
        const n = { ...payload.new, patientId: payload.new.patient_id, patientName: payload.new.patient_name, doctorId: payload.new.doctor_id, doctorName: payload.new.doctor_name };
        setConfidentialNotes(prev => prev.some(x=>x.id===n.id) ? prev : [...prev, n]);
      })
      // Notifications
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications' }, (payload) => {
        const n = mapNotif(payload.new);
        setNotifications(prev => prev.some(x=>x.id===n.id) ? prev : [n, ...prev]);
      })
      // Inventory
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'inventory' }, (payload) => {
        const m = { ...payload.new, minStock: payload.new.min_stock, lastRestock: payload.new.last_restock };
        setInventory(prev => prev.map(x => x.id===m.id ? m : x));
      })
      // Vitals (reload patient vitals on new insert)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'vitals' }, (payload) => {
        const v = payload.new;
        setPatients(prev => prev.map(p => p.id===v.patient_id ? { ...p, vitals: { temp: v.temp, tension: v.tension, poids: v.poids, taille: v.taille, pouls: v.pouls, spo2: v.spo2, triage: v.triage } } : p));
      })
      .subscribe();

    // ===== PRESENCE CHANNEL (online/offline staff tracking) =====
    const presenceChannel = supabase.channel('online-staff', { config: { presence: { key: user.id } } });
    presenceChannel
      .on('presence', { event: 'sync' }, () => {
        const state = presenceChannel.presenceState();
        const online = [];
        Object.keys(state).forEach(key => {
          state[key].forEach(p => { if(p.staffId) online.push(p.staffId); });
        });
        setOnlineStaff([...new Set(online)]);
      })
      .subscribe(async (status) => {
        if (status === 'SUBSCRIBED') {
          await presenceChannel.track({ staffId: user.id, name: user.name, role: user.role, joinedAt: new Date().toISOString() });
        }
      });

    // Untrack on tab close / beforeunload
    const handleUnload = () => { presenceChannel.untrack(); };
    window.addEventListener('beforeunload', handleUnload);

    return () => {
      window.removeEventListener('beforeunload', handleUnload);
      presenceChannel.untrack();
      supabase.removeChannel(presenceChannel);
      supabase.removeChannel(channel);
    };
  }, [user]);

  if(!user) return <LoginPage onLogin={(u)=>{setUser(u);setActivePortal(u.role==='superadmin'?'admin':u.role);}}/>;

  if (loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f4f5f7',flexDirection:'column',gap:'16px'}}>
      <img src={CLINIC.logo} alt="Logo" style={{width:'80px',height:'auto'}} onError={(e)=>{e.target.style.display='none'}}/>
      <div style={{fontSize:'14px',color:'#1a3c34',fontWeight:600}}>Chargement des données...</div>
      <div style={{width:'200px',height:'4px',background:'#e0e4e2',borderRadius:'2px',overflow:'hidden'}}>
        <div style={{width:'60%',height:'100%',background:'#2e7d5b',borderRadius:'2px',animation:'loading 1.5s ease-in-out infinite'}}></div>
      </div>
    </div>
  );

  const allStaff=[...STAFF_DB,...STAFF_NO_LOGIN];
  const isSuperAdmin=user.role==='superadmin';
  const effectiveRole=isSuperAdmin?(activePortal||'admin'):user.role;
  const props={user:{...user,role:effectiveRole,isSuperAdmin},patients,setPatients,inventory,setInventory,payments,setPayments,labOrders,setLabOrders,confidentialNotes,setConfidentialNotes,prescriptions,setPrescriptions,notifications,setNotifications,addNotification,toast};

  const portal={
    reception:<FrontDeskView {...props}/>,
    nurse:<NurseView {...props}/>,
    doctor:<DoctorView {...props}/>,
    lab:<LabView {...props}/>,
    pharmacy:<PharmacyView {...props}/>,
    admin:<AdminView {...props} staff={allStaff} onlineStaff={onlineStaff}/>,
  };

  const currentView=activePortal||user.role;

  return(<div>
    {user.role==='superadmin'&&<div style={{position:'fixed',top:0,left:0,right:0,zIndex:1001,background:'linear-gradient(135deg,#7c3aed,#a855f7)',padding:'6px 20px',display:'flex',alignItems:'center',gap:'12px',boxShadow:'0 2px 12px rgba(124,58,237,.3)'}}>
      <span style={{color:'#fff',fontSize:'11px',fontWeight:700,letterSpacing:'.5px'}}><i className="fas fa-shield-halved"></i> SUPER ADMIN — ACCÈS TOTAL</span>
      <div style={{display:'flex',gap:'4px',marginLeft:'auto'}}>
        {[{id:'admin',label:'Admin',icon:'fa-chart-pie'},{id:'reception',label:'Réception',icon:'fa-door-open'},{id:'pharmacy',label:'Pharmacie',icon:'fa-pills'},{id:'nurse',label:'Infirmier',icon:'fa-heartbeat'},{id:'doctor',label:'Médecin',icon:'fa-stethoscope'},{id:'lab',label:'Labo',icon:'fa-flask'}].map(p=>(
          <button key={p.id} onClick={()=>setActivePortal(p.id)} style={{padding:'4px 12px',borderRadius:'6px',border:'none',cursor:'pointer',fontSize:'11px',fontWeight:600,background:currentView===p.id?'#fff':'rgba(255,255,255,.15)',color:currentView===p.id?'#7c3aed':'#fff',transition:'all .15s',display:'flex',alignItems:'center',gap:'5px'}}>
            <i className={`fas ${p.icon}`} style={{fontSize:'10px'}}></i>{p.label}
          </button>
        ))}
      </div>
    </div>}
    <div style={user.role==='superadmin'?{paddingTop:'38px',height:'100vh'}:{}}>
      {portal[currentView]||portal.admin}
    </div>
    <AIAssistant user={user}/>
  </div>);
}

// ============ LOGIN ============
function LoginPage({onLogin}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);

  const handleLogin=(e)=>{
    e.preventDefault();setLoading(true);setError('');
    setTimeout(()=>{
      const uname=username.toLowerCase().trim();
      const pwd=password.trim();
      const foundUser=STAFF_DB.find(s=>s.username===uname);
      if(!foundUser){setError('Identifiant "'+uname+'" introuvable. Vérifiez votre nom d\'utilisateur.');setLoading(false);return;}
      if(foundUser.password!==pwd){setError('Mot de passe incorrect pour '+foundUser.name+'. Veuillez réessayer.');setLoading(false);return;}
      onLogin(foundUser);
    },600);
  };

  return(<div className="login-page">
    <div className="login-card" role="dialog" aria-labelledby="login-title">
      <div className="logo-area">
        <div className="logo-fallback" aria-hidden="true"><i className="fas fa-cross"></i></div>
        <div id="login-title" className="clinic-name">{CLINIC.name}</div>
        <div className="clinic-sub">{CLINIC.tagline}</div>
        <div className="clinic-addr"><i className="fas fa-map-marker-alt" aria-hidden="true"></i> Ngiri-Ngiri, Kinshasa</div>
      </div>
      <p style={{fontSize:'12px',color:'var(--text-light)',marginBottom:'22px',textAlign:'center',fontWeight:500}}>Accès réservé au personnel autorisé</p>
      <form onSubmit={handleLogin}>
        <div className="form-group">
          <label htmlFor="login-user"><i className="fas fa-user" style={{fontSize:'10px'}}></i> Identifiant</label>
          <input id="login-user" value={username} onChange={e=>setUsername(e.target.value)} placeholder="Nom d'utilisateur" autoFocus autoComplete="username"/>
        </div>
        <div className="form-group">
          <label htmlFor="login-pwd"><i className="fas fa-lock" style={{fontSize:'10px'}}></i> Mot de passe</label>
          <input id="login-pwd" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" autoComplete="current-password"/>
        </div>
        {error&&<div role="alert" style={{color:'var(--danger-700)',fontSize:'12.5px',marginBottom:'16px',padding:'10px 14px',background:'var(--danger-50)',borderRadius:'var(--r-md)',border:'1px solid var(--danger-100)',display:'flex',alignItems:'flex-start',gap:'8px'}}><i className="fas fa-exclamation-circle" style={{marginTop:'2px',color:'var(--danger-500)'}}></i><span>{error}</span></div>}
        <button className={`btn btn-primary btn-block btn-lg ${loading?'loading':''}`} type="submit" disabled={loading}>
          {loading?<><i className="fas fa-spinner fa-spin"></i> Connexion...</>:<><i className="fas fa-arrow-right-to-bracket"></i> Se connecter</>}
        </button>
      </form>
      <div style={{textAlign:'center',marginTop:'24px',paddingTop:'18px',borderTop:'1px solid var(--border-subtle)',fontSize:'10.5px',color:'var(--text-muted)',lineHeight:1.8}}>
        <div style={{fontWeight:600,color:'var(--text-light)'}}>{CLINIC.name}</div>
        <div>Système de Gestion Hospitalière — v2.0</div>
        <a href={CLINIC.facebook} target="_blank" rel="noopener" style={{color:'var(--primary-500)',textDecoration:'none',fontSize:'10.5px',fontWeight:500,display:'inline-flex',alignItems:'center',gap:'4px',marginTop:'4px'}}><i className="fab fa-facebook" aria-hidden="true"></i> Page Facebook</a>
      </div>
    </div>
  </div>);
}

// ============ HELPERS: INITIALS, INSURANCE COLOR ============
function getInitials(name){return (name||'').split(' ').filter(Boolean).map(n=>n[0]).slice(0,2).join('').toUpperCase();}
function insuranceClass(t){return ({'Régulier':'ins-regulier','CSU':'ins-csu','Academia':'ins-academia','AMC':'ins-amc','Activa':'ins-activa'})[t]||'ins-regulier';}
function PatientAvatar({patient,size}){
  const cls=patient.sexe==='F'?'female':patient.sexe==='M'?'male':'unk';
  return <div className={`p-avatar ${cls} ${size||''}`} aria-hidden="true">{getInitials(patient.nom+' '+patient.prenom)}</div>;
}
function TopbarClock(){
  const [now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(t);},[]);
  return(<div className="topbar-clock" aria-label="Heure actuelle">
    <span className="dot"></span>
    <span>{now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>
    <span style={{opacity:.5}}>·</span>
    <span>{now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</span>
  </div>);
}

function FrontDeskView({user,patients,setPatients,toast}){

  const [form,setForm]=useState({nom:'',prenom:'',phone:'',email:'',sexe:'M',dob:'',langue:'Français',adresse:'',motif:''});
  const [saving,setSaving]=useState(false);
  const todayPatients=patients.filter(p=>new Date(p.registeredAt).toDateString()===new Date().toDateString());

  const registerPatient=async(e)=>{
    e.preventDefault();
    if(!form.nom.trim()||!form.prenom.trim()||!form.phone.trim()){toast.error('Veuillez remplir le nom, prénom et téléphone.');return;}
    setSaving(true);
    try{
      const newP={id:genId(),nom:form.nom.trim(),prenom:form.prenom.trim(),phone:form.phone.trim(),email:form.email.trim(),sexe:form.sexe,dob:form.dob,langue:form.langue,adresse:form.adresse.trim(),motif:form.motif.trim(),insurance:'Régulier',step:1,stepLabel:'Pharmacie (Consultation)',registeredAt:new Date().toISOString(),registeredBy:user.name,vitals:null,isNew:true,payments:[],labResults:[],prescriptions:[]};
      const {error}=await supabase.from('patients').insert({
        id: newP.id, nom: newP.nom, prenom: newP.prenom, phone: newP.phone, email: newP.email,
        sexe: newP.sexe, dob: newP.dob || null, langue: newP.langue, adresse: newP.adresse, motif: newP.motif,
        insurance: 'Régulier', step: 1, step_label: 'Pharmacie (Consultation)',

      });
      if(error) throw error;
      setPatients([newP,...patients]);
      setForm({nom:'',prenom:'',phone:'',email:'',sexe:'M',dob:'',langue:'Français',adresse:'',motif:''});
      toast.success(`${newP.nom} ${newP.prenom} enregistré → Pharmacie`);

    {id:'register',icon:'fas fa-user-plus',label:'Nouveau Patient'},

    {id:'search',icon:'fas fa-search',label:'Rechercher'},

  return(<DashLayout user={user} tabs={tabs} activeTab={tab} setActiveTab={setTab}>
    {tab==='register'&&(<div>

      <div className="card">
        <form onSubmit={registerPatient}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
            <div className="form-group"><label>Nom de famille *</label><input required value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})} placeholder="MBALA"/></div>
            <div className="form-group"><label>Prénom *</label><input required value={form.prenom} onChange={e=>setForm({...form,prenom:e.target.value})} placeholder="Jean-Pierre"/></div>
            <div className="form-group"><label>Téléphone *</label><input required value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="+243 8XX XXX XXX"/></div>
            <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="optionnel"/></div>
            <div className="form-group"><label>Sexe</label><select value={form.sexe} onChange={e=>setForm({...form,sexe:e.target.value})}><option value="M">Masculin</option><option value="F">Féminin</option></select></div>
            <div className="form-group"><label>Date de naissance</label><input type="date" value={form.dob} onChange={e=>setForm({...form,dob:e.target.value})}/></div>
            <div className="form-group"><label>Langue préférée</label><select value={form.langue} onChange={e=>setForm({...form,langue:e.target.value})}><option>Français</option><option>Lingala</option><option>Kikongo</option><option>Swahili</option><option>Tshiluba</option></select></div>
            <div className="form-group"><label>Adresse / Quartier</label><input value={form.adresse} onChange={e=>setForm({...form,adresse:e.target.value})} placeholder="Quartier, Commune"/></div>
          </div>
          <div className="form-group" style={{marginTop:'8px'}}><label>Motif de visite</label><input value={form.motif} onChange={e=>setForm({...form,motif:e.target.value})} placeholder="Ex: Fièvre, consultation prénatale, douleurs..."/></div>
          <div style={{display:'flex',gap:'12px',marginTop:'20px'}}>
            <button className={`btn btn-primary btn-lg ${saving?'loading':''}`} type="submit" disabled={saving}>{saving?<><i className="fas fa-spinner fa-spin"></i> Enregistrement...</>:<><i className="fas fa-check-circle"></i> Enregistrer & Envoyer → Pharmacie</>}</button>
          </div>
        </form>
      </div>
    </div>)}
    {tab==='list'&&(<div>

function DoctorConsult({patient,user,patients,setPatients,labOrders,setLabOrders,confidentialNotes,setConfidentialNotes,prescriptions,setPrescriptions,onOpenDossier,onEditPatient,payments,addNotification,toast}){
  const [insurance,setInsurance]=useState(patient.insurance);
  const [note,setNote]=useState('');
  const [labDesc,setLabDesc]=useState('');
  const [rxText,setRxText]=useState('');
  const [diagnosis,setDiagnosis]=useState(patient.diagnosis||'');

  // Show lab results for this patient
  const patientLabs=labOrders.filter(l=>l.patientId===patient.id);
  const completedLabs=patientLabs.filter(l=>l.status==='completed');
  const patientRx=prescriptions.filter(r=>r.patientId===patient.id);
  const patientPayments=(payments||[]).filter(p=>p.patientId===patient.id);

  const t = toast || {success:()=>{},error:()=>{},info:()=>{},warning:()=>{}};

  const assignInsurance=async()=>{
    try{
      await supabase.from('patients').update({ insurance }).eq('id', patient.id);
      setPatients(patients.map(p=>p.id===patient.id?{...p,insurance}:p));
      t.success('Catégorie: '+insurance);
    }catch(err){t.error('Erreur mise à jour assurance');}
  };

  const addNote=async()=>{
    if(!note.trim()){t.warning('Écrivez une note avant de sauvegarder.');return;}
    try{
      const newNote = { id: 'N' + Date.now(), patientId: patient.id, patientName: `${patient.nom} ${patient.prenom}`, doctorId: user.id, doctorName: user.name, content: note, date: new Date().toISOString() };
      const {error}=await supabase.from('confidential_notes').insert({
        id: newNote.id, patient_id: patient.id, patient_name: newNote.patientName,
        doctor_id: user.id, doctor_name: user.name, content: note, date: newNote.date
      });
      if(error) throw error;
      setConfidentialNotes([...confidentialNotes, newNote]);
      setNote('');t.success('Note confidentielle enregistrée');
    }catch(err){t.error('Erreur sauvegarde note');}
  };

  const orderLab=async()=>{
    if(!labDesc.trim()){t.warning('Indiquez les examens à demander.');return;}
    try{
      const newOrder = { id: 'LAB' + Date.now(), patientId: patient.id, patientName: `${patient.nom} ${patient.prenom}`, description: labDesc, orderedBy: user.name, date: new Date().toISOString(), status: 'pending', results: null };
      const {error}=await supabase.from('lab_orders').insert({
        id: newOrder.id, patient_id: patient.id, patient_name: newOrder.patientName,
        description: labDesc, ordered_by: user.name, date: newOrder.date, status: 'pending'
      });
      if(error) throw error;
      setLabOrders([...labOrders, newOrder]);
      setLabDesc('');t.success('Ordre labo ajouté: '+labDesc);
    }catch(err){t.error('Erreur ordre labo');}
  };

  const addRx=async()=>{
    if(!rxText.trim()){t.warning('Indiquez la prescription.');return;}
    try{
      const newRx = { id: 'RX' + Date.now(), patientId: patient.id, patientName: `${patient.nom} ${patient.prenom}`, content: rxText, prescribedBy: user.name, date: new Date().toISOString(), dispensed: false };
      const {error}=await supabase.from('prescriptions').insert({
        id: newRx.id, patient_id: patient.id, patient_name: newRx.patientName,
        content: rxText, prescribed_by: user.name, date: newRx.date, dispensed: false
      });
      if(error) throw error;
      setPrescriptions([...prescriptions, newRx]);
      setRxText('');t.success('Prescription ajoutée');
    }catch(err){t.error('Erreur prescription');}
  };

  const sendToPharmacy=async(nextStep,nextLabel)=>{
    try{
      await supabase.from('patients').update({ step: nextStep, step_label: nextLabel, diagnosis, doctor_id: user.id, doctor_name: user.name }).eq('id', patient.id);
      setPatients(patients.map(p=>p.id===patient.id?{...p,step:nextStep,stepLabel:nextLabel,diagnosis,doctorId:user.id,doctorName:user.name}:p));
      t.success(`Patient → ${nextLabel}`);
    }catch(err){t.error('Erreur transfert patient');}
  };

  return(<div className="card" style={{borderLeft:'3px solid var(--accent)'}}>
    <div className="card-header">
      <div className="p-headline" style={{flex:1,minWidth:'240px'}}>
        <PatientAvatar patient={patient}/>
        <div style={{flex:1,minWidth:0}}>
          <div className="p-name">{patient.nom} {patient.prenom}</div>
          <div className="p-meta">{patient.sexe==='M'?'M':'F'} <span style={{opacity:.4}}>·</span> <i className="fas fa-hashtag" style={{fontSize:'9px',opacity:.5}}></i>{patient.id} <span style={{opacity:.4}}>·</span> <i className="fas fa-phone" style={{fontSize:'9px',opacity:.5}}></i> {patient.phone}</div>
          <div className="patient-flow" style={{marginTop:'10px'}}>{STEPS.map((s,i)=><span key={i} className={`flow-step ${i<patient.step?'done':''} ${i===patient.step?'current':''}`}>{s}</span>)}</div>
        </div>
      </div>
      <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
        <button className="btn btn-sm btn-outline" onClick={()=>onOpenDossier&&onOpenDossier(patient)}><i className="fas fa-folder-open"></i> Dossier</button>
        <button className="btn btn-sm btn-outline" onClick={()=>onEditPatient&&onEditPatient(patient)}><i className="fas fa-pen"></i> Modifier</button>
        <span className={`badge ${insuranceClass(patient.insurance)}`} style={{fontSize:'12px',padding:'5px 12px'}}><i className="fas fa-shield-halved" style={{fontSize:'10px'}}></i> {patient.insurance}</span>
      </div>
    </div>

    {patient.vitals&&<div style={{background:'#f0f7f4',borderRadius:'8px',padding:'12px 16px',marginBottom:'16px',fontSize:'12px'}}>
      <strong>Vitaux:</strong> T° {patient.vitals.temp}°C | TA: {patient.vitals.tension} | Poids: {patient.vitals.poids}kg | Taille: {patient.vitals.taille}cm | Pouls: {patient.vitals.pouls}bpm | SpO2: {patient.vitals.spo2}% | <span className={`badge badge-sm ${patient.vitals.triage.includes('Rouge')?'badge-red':patient.vitals.triage.includes('Orange')?'badge-yellow':'badge-green'}`}>{patient.vitals.triage}</span>
    </div>}

    {/* Show existing lab results if any */}
    {completedLabs.length>0&&<div style={{background:'#e4edf6',borderRadius:'8px',padding:'12px 16px',marginBottom:'16px',fontSize:'12px'}}>
      <strong><i className="fas fa-flask"></i> Résultats Labo disponibles:</strong>
      {completedLabs.map(l=><div key={l.id} style={{marginTop:'6px',padding:'6px 10px',background:'#fff',borderRadius:'4px'}}>
        <strong>{l.description}:</strong> {l.results} <span style={{color:'var(--text-light)',fontSize:'10px'}}>({l.completedBy}, {new Date(l.completedAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})})</span>
      </div>)}
    </div>}

    {/* Show existing prescriptions */}
    {patientRx.length>0&&<div style={{background:'#fffbf5',borderRadius:'8px',padding:'12px 16px',marginBottom:'16px',fontSize:'12px'}}>
      <strong><i className="fas fa-pills"></i> Prescriptions:</strong>
      {patientRx.map(r=><div key={r.id} style={{marginTop:'4px'}}>{r.content} <span className={`badge badge-sm ${r.dispensed?'badge-green':'badge-yellow'}`}>{r.dispensed?'Dispensé':'En attente'}</span></div>)}
    </div>}

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}}>
      <div>
        <div className="form-group"><label>Diagnostic</label><input value={diagnosis} onChange={e=>setDiagnosis(e.target.value)} placeholder="Diagnostic principal..."/></div>
        <div className="form-group"><label>Catégorie Assurance</label>
          <div style={{display:'flex',gap:'8px'}}><select value={insurance} onChange={e=>setInsurance(e.target.value)} style={{flex:1}}>{INSURANCE_TYPES.map(t=><option key={t}>{t}</option>)}</select>
          <button className="btn btn-sm btn-gold" onClick={assignInsurance} title="Assigner"><i className="fas fa-check"></i></button></div>
        </div>
      </div>
      <div>
        <div className="form-group"><label><i className="fas fa-flask"></i> Examens de Labo</label><div style={{display:'flex',gap:'8px'}}><input value={labDesc} onChange={e=>setLabDesc(e.target.value)} placeholder="NFS, GE, CRP..."/><button className="btn btn-sm btn-primary" onClick={orderLab}><i className="fas fa-plus"></i></button></div></div>
        <div className="form-group"><label><i className="fas fa-pills"></i> Prescription</label><div style={{display:'flex',gap:'8px'}}><input value={rxText} onChange={e=>setRxText(e.target.value)} placeholder="Médicaments + posologie"/><button className="btn btn-sm btn-success" onClick={addRx}><i className="fas fa-plus"></i></button></div></div>
      </div>
    </div>

    <div className="form-group"><label><i className="fas fa-lock"></i> Note Confidentielle (Médecin + Admin)</label>
      <div style={{display:'flex',gap:'8px'}}><textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Note privée (non visible par le patient ou autres services)..." style={{minHeight:'60px',flex:1}}/><button className="btn btn-sm btn-warning" onClick={addNote} style={{alignSelf:'flex-end'}}><i className="fas fa-lock"></i> Sauver</button></div>
    </div>

    {/* Payment history for this patient */}
    {patientPayments.length>0&&<div style={{fontSize:'12px',color:'var(--text-light)',marginBottom:'8px'}}>
      <i className="fas fa-receipt"></i> {patientPayments.length} paiement(s) enregistré(s) — Total: {fmt(patientPayments.reduce((s,p)=>s+p.amount,0))}
    </div>}

    <div style={{display:'flex',gap:'12px',marginTop:'16px',paddingTop:'16px',borderTop:'1px solid var(--border)'}}>
      <button className="btn btn-primary" onClick={()=>sendToPharmacy(4,'Pharmacie (Examens/Méds)')}><i className="fas fa-flask"></i> Pharmacie → Labo/Méds</button>
      <button className="btn btn-success" onClick={()=>sendToPharmacy(6,'Pharmacie (Sortie)')}><i className="fas fa-door-open"></i> Pharmacie → Sortie</button>
    </div>
  </div>);
}

// ============ LAB VIEW ============
function LabView({user,patients,setPatients,labOrders,setLabOrders,addNotification,payments,prescriptions,toast}){
  const [tab,setTab]=useState('pending');
  const [dossierPatient,setDossierPatient]=useState(null);
  const [editPatient,setEditPatient]=useState(null);
  const pending=labOrders.filter(o=>o.status==='pending');
  const completed=labOrders.filter(o=>o.status==='completed');
  const labPatientIds=[...new Set(labOrders.map(l=>l.patientId))];
  const labPatients=patients.filter(p=>labPatientIds.includes(p.id));

  const submitResult=async(orderId,result)=>{
    try{
      const now = new Date().toISOString();
      const {error}=await supabase.from('lab_orders').update({ status: 'completed', results: result, completed_at: now, completed_by: user.name }).eq('id', orderId);
      if(error) throw error;
      setLabOrders(labOrders.map(o=>o.id===orderId?{...o,status:'completed',results:result,completedAt:now,completedBy:user.name}:o));
      const order=labOrders.find(o=>o.id===orderId);
      if(order){
        await supabase.from('patients').update({ step: 3, step_label: 'Médecin (Résultats)' }).eq('id', order.patientId);
        setPatients(patients.map(p=>p.id===order.patientId?{...p,step:3,stepLabel:'Médecin (Résultats)'}:p));
        const patient=patients.find(p=>p.id===order.patientId);
        if(patient && patient.doctorId){
          addNotification({
            type:'lab', patientId:patient.id, patientName:`${patient.nom} ${patient.prenom}`,
            forDoctorId:patient.doctorId, forDoctorName:patient.doctorName||'',
            fromUser:user.name, message:`Résultats labo prêts: ${order.description}`
          });
        }
      }
      toast.success('Résultats soumis → Médecin');
    }catch(err){toast.error('Erreur soumission résultats: '+(err.message||''));}
  };

  const tabs=[
    {id:'pending',icon:'fas fa-flask',label:'En Attente',count:pending.length},
    {id:'completed',icon:'fas fa-check-double',label:'Complétés',count:completed.length},
    {id:'patients',icon:'fas fa-users',label:'Patients Labo',count:labPatients.length},
  ];

  return(<DashLayout user={user} tabs={tabs} activeTab={tab} setActiveTab={setTab}>
    {tab==='pending'&&(<div>
      <div className="page-header"><div><h1>Ordres de Laboratoire</h1><p>{pending.length} analyse(s) en attente</p></div></div>
      {pending.length===0&&<div className="card" style={{textAlign:'center',padding:'30px'}}><p style={{color:'var(--text-light)'}}>Tous les examens sont traités</p></div>}
      {pending.map(o=><LabOrderCard key={o.id} order={o} onSubmit={submitResult} patient={patients.find(p=>p.id===o.patientId)}/>)}
    </div>)}
    {tab==='completed'&&(<div>
      <div className="page-header"><div><h1>Résultats Complétés</h1></div></div>
      <div className="card"><table><thead><tr><th>Patient</th><th>Examens</th><th>Résultats</th><th>Par</th><th>Date</th></tr></thead><tbody>
      {completed.map(o=><tr key={o.id}><td><strong>{o.patientName}</strong></td><td>{o.description}</td><td style={{fontSize:'12px',maxWidth:'200px'}}>{o.results}</td><td>{o.completedBy}</td><td>{new Date(o.completedAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</td></tr>)}
      </tbody></table></div>
    </div>)}
    {tab==='patients'&&(<div>
      <div className="page-header"><div><h1>Patients avec Examens</h1><p>{labPatients.length} patient(s) avec historique de laboratoire</p></div></div>
      {labPatients.map(p=><div key={p.id} className="card" style={{borderLeft:'4px solid var(--info)'}}>
        <div className="card-header">
          <div><h3><i className="fas fa-user"></i> {p.nom} {p.prenom}</h3>
            <div className="patient-flow">{STEPS.map((s,i)=><span key={i} className={`flow-step ${i<p.step?'done':''} ${i===p.step?'current':''}`}>{s}</span>)}</div>
          </div>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <span className="badge badge-gold">{p.insurance}</span>
            <span className={`badge ${p.step===7?'badge-green':'badge-blue'}`}>{p.stepLabel}</span>
          </div>
        </div>
        {/* Show all labs for this patient */}
        {labOrders.filter(l=>l.patientId===p.id).map(l=><div key={l.id} style={{padding:'8px 12px',background:l.status==='completed'?'#e8f0eb':'#fff8e1',borderRadius:'6px',marginBottom:'6px',fontSize:'12px',border:'1px solid '+(l.status==='completed'?'#c8e0cc':'#ffe0a0')}}>
          <strong>{l.description}</strong> <span className={`badge badge-sm ${l.status==='completed'?'badge-green':'badge-yellow'}`}>{l.status==='completed'?'Complété':'En attente'}</span>
          {l.results&&<div style={{marginTop:'4px',color:'var(--text)'}}>→ {l.results}</div>}
        </div>)}
        <div style={{display:'flex',gap:'8px',marginTop:'8px'}}>
          <button className="btn btn-sm btn-primary" onClick={()=>setDossierPatient(p)}><i className="fas fa-folder-open"></i> Dossier</button>
          <button className="btn btn-sm btn-outline" onClick={()=>setEditPatient(p)}><i className="fas fa-pen"></i> Modifier</button>
        </div>
      </div>)}
    </div>)}
    {/* Modals */}
    {dossierPatient&&<PatientDossier patient={dossierPatient} payments={payments||[]} labOrders={labOrders} prescriptions={prescriptions||[]} confidentialNotes={[]} user={user} onClose={()=>setDossierPatient(null)}/>}
    {editPatient&&<EditPatientModal patient={editPatient} patients={patients} setPatients={setPatients} onClose={()=>setEditPatient(null)}/>}
  </DashLayout>);
}

function LabOrderCard({order,onSubmit}){
  const [result,setResult]=useState('');
  return(<div className="card" style={{borderLeft:'4px solid var(--info)'}}>
    <div className="card-header"><h3><i className="fas fa-vial"></i> {order.patientName}</h3><span className="badge badge-yellow">En attente</span></div>
    <div style={{background:'#f0f7f4',borderRadius:'8px',padding:'12px',marginBottom:'12px'}}>
      <p style={{fontSize:'13px'}}><strong>Examens demandés:</strong> {order.description}</p>
      <p style={{fontSize:'11px',color:'var(--text-light)',marginTop:'4px'}}>Prescrit par: {order.orderedBy} | {new Date(order.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</p>
    </div>
    <div className="form-group"><label>Résultats d'analyse</label><textarea value={result} onChange={e=>setResult(e.target.value)} placeholder="Saisir les résultats d'analyse..." style={{minHeight:'100px'}}/></div>
    <button className="btn btn-success" onClick={()=>{if(result.trim())onSubmit(order.id,result)}}><i className="fas fa-paper-plane"></i> Soumettre Résultats → Médecin</button>
