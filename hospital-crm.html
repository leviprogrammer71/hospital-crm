}

// ============ PHARMACY VIEW ============
function PharmacyView({user,patients,setPatients,inventory,setInventory,payments,setPayments,prescriptions,setPrescriptions,addNotification,labOrders,toast}){
  const [tab,setTab]=useState('payments');
  const [dossierPatient,setDossierPatient]=useState(null);
  const [editPatient,setEditPatient]=useState(null);
  const [patientSearch,setPatientSearch]=useState('');
  const pharmacyQueue=patients.filter(p=>[1,4,6].includes(p.step));
  const allPharmacyPatients=patients.filter(p=>p.step>=1);
  const filteredPharmacyPatients=patientSearch.length>=2?allPharmacyPatients.filter(p=>`${p.nom} ${p.prenom} ${p.phone} ${p.id}`.toLowerCase().includes(patientSearch.toLowerCase())):allPharmacyPatients;

  const tabs=[
    {id:'payments',icon:'fas fa-cash-register',label:'Caisse',count:pharmacyQueue.length},
    {id:'allpatients',icon:'fas fa-users',label:'Tous les Patients',count:allPharmacyPatients.length},
    {id:'prescriptions',icon:'fas fa-prescription',label:'Ordonnances'},
    {id:'inventory',icon:'fas fa-boxes-stacked',label:'Stock'},
    {id:'edit',icon:'fas fa-user-pen',label:'Modifier Patient'},
    {id:'reports',icon:'fas fa-chart-line',label:'Rapports Financiers'},
  ];

  const payAndForward=async(patient,amount,description,nextStep,nextLabel)=>{
    const parsedAmount=parseInt(amount)||0;
    if(parsedAmount<=0){toast.error('Montant invalide. Entrez un montant supérieur à 0.');return;}
    try{
      const payment={id:'PAY'+Date.now(),patientId:patient.id,patientName:`${patient.nom} ${patient.prenom}`,amount:parsedAmount,description,insurance:patient.insurance,date:new Date().toISOString(),processedBy:user.name};
      const {error}=await supabase.from('payments').insert({
        id: payment.id, patient_id: patient.id, patient_name: payment.patientName,
        amount: payment.amount, description, insurance: patient.insurance, date: payment.date, processed_by: user.name
      });
      if(error) throw error;
      await supabase.from('patients').update({ step: nextStep, step_label: nextLabel, is_new: false }).eq('id', patient.id);
      setPayments([payment,...payments]);
      setPatients(patients.map(p=>p.id===patient.id?{...p,step:nextStep,stepLabel:nextLabel,isNew:false,payments:[...(p.payments||[]),payment]}:p));
      if(patient.doctorId){
        addNotification({
          type:'payment', patientId:patient.id, patientName:`${patient.nom} ${patient.prenom}`,
          forDoctorId:patient.doctorId, forDoctorName:patient.doctorName||'',
          fromUser:user.name, message:`Paiement ${fmt(parsedAmount)} traité — ${description}`
        });
      }
      toast.success(`${fmt(parsedAmount)} enregistré → ${nextLabel}`);
    }catch(err){toast.error('Erreur paiement: '+(err.message||'Connexion perdue'));}
  };

  return(<DashLayout user={user} tabs={tabs} activeTab={tab} setActiveTab={setTab}>
    {tab==='payments'&&<PharmacyPayments queue={pharmacyQueue} payAndForward={payAndForward} payments={payments} labOrders={labOrders} prescriptions={prescriptions}/>}
    {tab==='allpatients'&&<div>
      <div className="page-header"><div><h1>Tous les Patients</h1><p>{allPharmacyPatients.length} patient(s) — Vue complète avec dossier</p></div></div>
      <div className="search-bar"><i className="fas fa-search"></i><input value={patientSearch} onChange={e=>setPatientSearch(e.target.value)} placeholder="Rechercher par nom, téléphone ou ID..."/></div>
      {filteredPharmacyPatients.map(p=>{
        const pPay=(payments||[]).filter(pay=>pay.patientId===p.id);
        const totalPaid=pPay.reduce((s,pay)=>s+pay.amount,0);
        return(<div key={p.id} className="card" style={{borderLeft:`4px solid ${p.step===7?'var(--accent)':[1,4,6].includes(p.step)?'var(--gold)':'var(--border)'}`}}>
          <div className="card-header">
            <div>
              <h3><i className="fas fa-user"></i> {p.nom} {p.prenom}</h3>
              <div className="patient-flow">{STEPS.map((s,i)=><span key={i} className={`flow-step ${i<p.step?'done':''} ${i===p.step?'current':''}`}>{s}</span>)}</div>
            </div>
            <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
              <span className="badge badge-gold">{p.insurance}</span>
              <span className={`badge ${p.step===7?'badge-green':'badge-blue'}`}>{p.stepLabel}</span>
              {totalPaid>0&&<span style={{fontSize:'13px',fontWeight:700,color:'var(--primary)'}}>{fmt(totalPaid)}</span>}
            </div>
          </div>
          <PatientActivityFeed patientId={p.id} payments={payments} labOrders={labOrders} prescriptions={prescriptions} limit={3}/>
          <div style={{display:'flex',gap:'8px',marginTop:'10px',paddingTop:'8px',borderTop:'1px solid #eef0ee'}}>
            <button className="btn btn-sm btn-primary" onClick={()=>setDossierPatient(p)}><i className="fas fa-folder-open"></i> Dossier</button>
            <button className="btn btn-sm btn-outline" onClick={()=>setEditPatient(p)}><i className="fas fa-pen"></i> Modifier</button>
          </div>
        </div>);
      })}
    </div>}
    {tab==='prescriptions'&&<PharmacyPrescriptions prescriptions={prescriptions} setPrescriptions={setPrescriptions} patients={patients} addNotification={addNotification} user={user} toast={toast}/>}
    {tab==='inventory'&&<PharmacyInventory inventory={inventory} setInventory={setInventory}/>}
    {tab==='edit'&&<PharmacyEditPatient patients={patients} setPatients={setPatients} toast={toast}/>}
    {tab==='reports'&&<PharmacyReports payments={payments}/>}
    {/* Modals */}
    {dossierPatient&&<PatientDossier patient={dossierPatient} payments={payments} labOrders={labOrders||[]} prescriptions={prescriptions} confidentialNotes={[]} user={user} onClose={()=>setDossierPatient(null)}/>}
    {editPatient&&<EditPatientModal patient={editPatient} patients={patients} setPatients={setPatients} onClose={()=>setEditPatient(null)}/>}
  </DashLayout>);
}

function PharmacyPayments({queue,payAndForward,payments,labOrders,prescriptions}){
  const [amounts,setAmounts]=useState({});
  return(<div>
    <div className="page-header"><div><h1>Caisse — Paiements</h1><p>{queue.length} patient(s) en attente de paiement · tous les paiements passent par la pharmacie</p></div></div>
    {queue.length===0&&<div className="card"><div className="empty-state">
      <div className="empty-state-icon"><i className="fas fa-cash-register"></i></div>
      <div className="empty-state-title">Caisse à jour</div>
      <div className="empty-state-body">Aucun paiement en attente. La file s'actualise automatiquement quand un patient arrive.</div>
    </div></div>}
    {queue.map(p=>{
      let desc='',nextStep=0,nextLabel='',suggestedAmount='',stepColor='var(--accent)',stepIcon='fa-stethoscope';
      if(p.step===1){desc='Consultation médicale';nextStep=2;nextLabel='Infirmier (Vitaux)';suggestedAmount='15000';stepColor='var(--accent)';stepIcon='fa-stethoscope';}
      else if(p.step===4){desc='Examens de laboratoire / Médicaments';nextStep=5;nextLabel='Laboratoire';suggestedAmount='25000';stepColor='var(--info-500)';stepIcon='fa-flask';}
      else if(p.step===6){desc='Frais de sortie / Résultats';nextStep=7;nextLabel='Terminé (Sortie)';suggestedAmount='10000';stepColor='var(--gold-500)';stepIcon='fa-door-open';}
      const currentVal = amounts[p.id]!==undefined?amounts[p.id]:suggestedAmount;
      return(<div key={p.id} className="card" style={{borderLeft:`3px solid ${stepColor}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'20px'}}>
          <div style={{flex:1,minWidth:'280px'}}>
            <div className="p-headline" style={{marginBottom:'8px'}}>
              <PatientAvatar patient={p}/>
              <div>
                <div className="p-name">{p.nom} {p.prenom}</div>
                <div className="p-meta"><i className="fas fa-hashtag" style={{fontSize:'9px',opacity:.5}}></i> {p.id} <span style={{opacity:.4,margin:'0 4px'}}>·</span> <i className="fas fa-phone" style={{fontSize:'9px',opacity:.5}}></i> {p.phone}</div>
              </div>
            </div>
            <div style={{display:'flex',gap:'6px',marginBottom:'8px',flexWrap:'wrap'}}>
              <span className={`badge ${insuranceClass(p.insurance)}`}><i className="fas fa-shield-halved" style={{fontSize:'9px'}}></i> {p.insurance}</span>
              <span className="badge" style={{background:`${stepColor}1a`,color:stepColor,boxShadow:`inset 0 0 0 1px ${stepColor}33`}}><i className={`fas ${stepIcon}`} style={{fontSize:'9px'}}></i> {desc}</span>
            </div>
            <div className="patient-flow">{STEPS.map((s,i)=><span key={i} className={`flow-step ${i<p.step?'done':''} ${i===p.step?'current':''}`}>{s}</span>)}</div>
            <PatientActivityFeed patientId={p.id} payments={payments} labOrders={labOrders} prescriptions={prescriptions} limit={3}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'stretch',gap:'10px',minWidth:'240px'}}>
            <label style={{fontSize:'10px',fontWeight:700,color:'var(--gold-600)',letterSpacing:'1px',textTransform:'uppercase'}}><i className="fas fa-money-bill-wave"></i> Montant à encaisser</label>
            <div className="pay-input-wrap">
              <input type="number" inputMode="numeric" placeholder={suggestedAmount} value={currentVal} onChange={e=>setAmounts({...amounts,[p.id]:e.target.value})} aria-label={`Montant pour ${p.nom} ${p.prenom}`}/>
              <span className="currency">CDF</span>
            </div>
            <button className="btn btn-success btn-lg" onClick={()=>{payAndForward(p,currentVal||suggestedAmount,desc,nextStep,nextLabel)}} style={{justifyContent:'center'}}><i className="fas fa-check-circle"></i> Encaisser & Transférer</button>
            <div style={{fontSize:'10.5px',color:'var(--text-muted)',textAlign:'center'}}>→ {nextLabel}</div>
          </div>
        </div>
      </div>);
    })}
  </div>);
}

function PharmacyPrescriptions({prescriptions,setPrescriptions,patients,addNotification,user,toast}){
  const pending=prescriptions.filter(rx=>!rx.dispensed);
  const done=prescriptions.filter(rx=>rx.dispensed);
  const dispense=async(rxId)=>{
    try{
      const now = new Date().toISOString();
      const {error}=await supabase.from('prescriptions').update({ dispensed: true, dispensed_at: now }).eq('id', rxId);
      if(error) throw error;
      setPrescriptions(prescriptions.map(rx=>rx.id===rxId?{...rx,dispensed:true,dispensedAt:now}:rx));
      const rx=prescriptions.find(r=>r.id===rxId);
      if(rx && patients){
        const patient=patients.find(p=>p.id===rx.patientId);
        if(patient && patient.doctorId){
          addNotification({
            type:'prescription', patientId:patient.id, patientName:`${patient.nom} ${patient.prenom}`,
            forDoctorId:patient.doctorId, forDoctorName:patient.doctorName||'',
            fromUser:user.name, message:`Prescription dispensée: ${rx.content.substring(0,50)}`
          });
        }
      }
      toast.success('Médicaments dispensés');
    }catch(err){toast.error('Erreur dispensation');}
  };
  return(<div>
    <div className="page-header"><div><h1>Ordonnances</h1><p>{pending.length} en attente de dispensation</p></div></div>
    {pending.length===0&&<div className="card"><p style={{color:'var(--text-light)',textAlign:'center',padding:'20px'}}>Toutes les ordonnances ont été traitées</p></div>}
    {pending.map(rx=><div key={rx.id} className="card" style={{borderLeft:'4px solid var(--warning)'}}>
      <div className="card-header"><h3><i className="fas fa-pills"></i> {rx.patientName}</h3><span className="badge badge-yellow">À dispenser</span></div>
      <div style={{background:'#fffbf5',borderRadius:'8px',padding:'12px',margin:'8px 0'}}><p style={{fontSize:'13px',fontWeight:500}}>{rx.content}</p></div>
      <p style={{fontSize:'11px',color:'var(--text-light)'}}>Prescrit par: {rx.prescribedBy} | {new Date(rx.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</p>
      <button className="btn btn-success btn-sm" onClick={()=>dispense(rx.id)} style={{marginTop:'12px'}}><i className="fas fa-check"></i> Marquer Dispensé</button>
    </div>)}
    {done.length>0&&<><h3 style={{margin:'24px 0 12px',color:'var(--text-light)'}}>Dispensés récemment</h3>
    <div className="card"><table><thead><tr><th>Patient</th><th>Prescription</th><th>Prescripteur</th><th>Dispensé à</th></tr></thead><tbody>
    {done.slice(0,10).map(rx=><tr key={rx.id}><td>{rx.patientName}</td><td style={{fontSize:'12px'}}>{rx.content}</td><td>{rx.prescribedBy}</td><td>{rx.dispensedAt?new Date(rx.dispensedAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):''}</td></tr>)}
    </tbody></table></div></>}
  </div>);
}

function PharmacyInventory({inventory,setInventory}){

  if(search)filtered=filtered.filter(m=>m.name.toLowerCase().includes(search.toLowerCase()));
  if(catFilter!=='all')filtered=filtered.filter(m=>m.category===catFilter);
  if(stockFilter==='low')filtered=filtered.filter(m=>m.stock<=m.minStock);
  else if(stockFilter==='ok')filtered=filtered.filter(m=>m.stock>m.minStock);

// Pure SVG bar chart — revenue by insurance
function BarChartByInsurance({data,totalAll}){
  const W=720, H=240, P_L=70, P_R=20, P_T=20, P_B=40;
  const chartW = W - P_L - P_R;
  const chartH = H - P_T - P_B;
  const max = Math.max(1, ...data.map(d=>d.total));
  // Build "nice" max with rounded ticks
  const niceMax = Math.ceil(max/10000)*10000 || 10000;
  const ticks = 4;
  const barColors = {'Régulier':'#5a6e67','CSU':'#2e8a5b','Academia':'#2563a8','AMC':'#c08a1d','Activa':'#8c4a8a'};
  const barW = (chartW / data.length) * 0.6;
  const slot = chartW / data.length;
  return(<svg className="chart-svg" viewBox={`0 0 ${W} ${H}`} role="img" aria-label="Revenus par catégorie d'assurance">
    <defs>
      {Object.entries(barColors).map(([k,c])=><linearGradient key={k} id={`bar-${k}`} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={c} stopOpacity="1"/><stop offset="100%" stopColor={c} stopOpacity=".7"/>
      </linearGradient>)}
    </defs>
    {/* Y axis grid */}
    {Array.from({length:ticks+1}).map((_,i)=>{
      const v = niceMax * i / ticks;
      const y = P_T + chartH - (chartH * i / ticks);
      return(<g key={i}>
        <line x1={P_L} x2={W-P_R} y1={y} y2={y} stroke="var(--border-subtle)" strokeWidth="1" strokeDasharray={i===0?'0':'2 4'}/>
        <text x={P_L-10} y={y+4} textAnchor="end" fontSize="11" fill="var(--text-muted)" fontWeight="500">{Math.round(v/1000)}k</text>
      </g>);
    })}
    {/* Bars */}
    {data.map((d,i)=>{
      const x = P_L + i*slot + (slot-barW)/2;
      const h = (d.total / niceMax) * chartH;
      const y = P_T + chartH - h;
      const color = barColors[d.type] || '#5a6e67';
      return(<g key={d.type} className="chart-bar">
        <rect x={x} y={y} width={barW} height={h} rx="4" fill={`url(#bar-${d.type})`}/>
        {d.total>0&&<text x={x+barW/2} y={y-6} textAnchor="middle" fontSize="11" fontWeight="700" fill={color}>{Math.round(d.total/1000)}k</text>}
        <text x={x+barW/2} y={H-P_B+18} textAnchor="middle" fontSize="11.5" fontWeight="600" fill="var(--text)">{d.type}</text>
        <text x={x+barW/2} y={H-P_B+32} textAnchor="middle" fontSize="10" fill="var(--text-muted)">{d.count} pat.</text>
      </g>);
    })}
    {/* Y axis label */}
    <text x={P_L-50} y={P_T+chartH/2} textAnchor="middle" fontSize="10" fill="var(--text-muted)" fontWeight="600" transform={`rotate(-90, ${P_L-50}, ${P_T+chartH/2})`} letterSpacing="1">CDF (milliers)</text>
  </svg>);
}

              <img src={CLINIC.logo} alt="Logo" style={{width:'48px',height:'auto'}} onError={(e)=>{e.target.style.display='none'}}/>
              <div><h3 style={{marginBottom:0}}>{CLINIC.name}</h3><p style={{fontSize:'10px',color:'var(--text-light)'}}>{CLINIC.tagline}</p></div>
            </div>
            <div style={{fontSize:'12px',lineHeight:'2.2',color:'var(--text)'}}>
              {CLINIC.address}<br/>
              Tél: {CLINIC.phone}<br/>
              Directeur: {CLINIC.director}
            </div>
          </div>
          <div className="card">
            <h3>Services</h3>
            {CLINIC.services.map(s=><div key={s} style={{padding:'5px 0',fontSize:'11.5px',borderBottom:'1px solid #eef0ee',color:'var(--text)'}}>{s}</div>)}
          </div>
        </div>
      </div>
    </div>)}

    {tab==='patients'&&(<div>
      <div className="page-header"><div><h1>Base de Données Patients</h1><p>{patients.length} patients enregistrés</p></div></div>
      <div className="card"><table><thead><tr><th>ID</th><th>Nom Complet</th><th>Sexe</th><th>Téléphone</th><th>Assurance</th><th>Étape</th><th>Enregistré par</th></tr></thead><tbody>
      {patients.map(p=><tr key={p.id}><td style={{fontFamily:'monospace',fontSize:'11px'}}>{p.id}</td><td><strong>{p.nom} {p.prenom}</strong>{p.isNew&&<span className="badge badge-new" style={{marginLeft:'6px'}}>NEW</span>}</td><td>{p.sexe}</td><td>{p.phone}</td><td><span className="badge badge-gold">{p.insurance}</span></td><td><span className={`badge ${p.step===7?'badge-green':'badge-blue'}`}>{p.stepLabel}</span></td><td style={{fontSize:'11px'}}>{p.registeredBy}</td></tr>)}
      </tbody></table></div>
    </div>)}

    {tab==='staff'&&(<div>
      <div className="page-header"><div><h1>Gestion du Personnel</h1><p>{staff.length} agents au total — <span style={{color:'var(--accent)',fontWeight:600}}>{(onlineStaff||[]).length} en ligne</span></p></div></div>
      <div className="stats-grid">
        <div className="stat-card info"><div className="stat-icon blue"><i className="fas fa-user-doctor"></i></div><div className="stat-value">{staff.filter(s=>s.role==='doctor').length}</div><div className="stat-label">Médecins</div></div>
        <div className="stat-card"><div className="stat-icon green"><i className="fas fa-user-nurse"></i></div><div className="stat-value">{staff.filter(s=>s.role==='nurse').length}</div><div className="stat-label">Infirmiers (EXP)</div></div>
        <div className="stat-card gold"><div className="stat-icon gold"><i className="fas fa-prescription-bottle"></i></div><div className="stat-value">{staff.filter(s=>s.role==='pharmacy').length+staff.filter(s=>!s.role&&s.dept==='Pharmacie').length}</div><div className="stat-label">Pharmacie</div></div>
        <div className="stat-card info"><div className="stat-icon blue"><i className="fas fa-vials"></i></div><div className="stat-value">{staff.filter(s=>s.role==='lab').length}</div><div className="stat-label">Laboratoire</div></div>
        <div className="stat-card"><div className="stat-icon green"><i className="fas fa-door-open"></i></div><div className="stat-value">{staff.filter(s=>s.role==='reception'||(!s.role&&s.dept==='Réception')).length}</div><div className="stat-label">Réception</div></div>
        <div className="stat-card danger"><div className="stat-icon red"><i className="fas fa-shield-halved"></i></div><div className="stat-value">{staff.filter(s=>!s.role&&s.dept==='Sécurité').length}</div><div className="stat-label">Sécurité</div></div>
      </div>
      <div className="card"><h3><i className="fas fa-user-check"></i> Agents avec accès système ({staff.filter(s=>s.username).length})</h3>
      <table><thead><tr><th>ID</th><th>Nom Complet</th><th>Département</th><th>Titre</th><th>Rôle</th><th>Identifiant</th><th>Statut</th></tr></thead><tbody>
      {staff.filter(s=>s.username).map(s=><tr key={s.id}><td style={{fontFamily:'monospace',fontSize:'11px'}}>{s.id}</td><td><strong>{s.name}</strong></td><td>{s.dept}</td><td>{s.title}</td><td><span className={`badge ${s.role==='admin'||s.role==='superadmin'?'badge-purple':s.role==='doctor'?'badge-blue':s.role==='nurse'?'badge-green':s.role==='pharmacy'?'badge-gold':s.role==='lab'?'badge-blue':'badge-yellow'}`}>{s.role==='superadmin'?'SUPER ADMIN':s.role}</span></td><td style={{fontFamily:'monospace',fontSize:'12px'}}>{s.username}</td><td>{(onlineStaff||[]).includes(s.id)?<span className="badge badge-green"><i className="fas fa-circle" style={{fontSize:'6px'}}></i> Actif</span>:<span className="badge" style={{background:'#e0e4e2',color:'#777'}}><i className="fas fa-circle" style={{fontSize:'6px'}}></i> Hors ligne</span>}</td></tr>)}
      </tbody></table></div>
      {staff.filter(s=>!s.username).length>0&&<div className="card" style={{borderLeft:'4px solid var(--warning)'}}>
        <h3><i className="fas fa-user-clock"></i> Agents sans accès système ({staff.filter(s=>!s.username).length})</h3>
        <table><thead><tr><th>ID</th><th>Nom Complet</th><th>Département</th><th>Titre</th><th>Statut</th></tr></thead><tbody>
        {staff.filter(s=>!s.username).map(s=><tr key={s.id}><td style={{fontFamily:'monospace',fontSize:'11px'}}>{s.id}</td><td><strong>{s.name}</strong></td><td>{s.dept}</td><td>{s.title}</td><td><span className="badge badge-yellow"><i className="fas fa-clock" style={{fontSize:'6px'}}></i> En attente</span></td></tr>)}
        </tbody></table>
      </div>}
    </div>)}

    {tab==='finance'&&<PharmacyReports payments={payments}/>}

    {tab==='notes'&&(<div>
      <div className="page-header"><div><h1>Notes Confidentielles</h1><p>Accès administrateur — toutes les notes des médecins</p></div></div>
      {confidentialNotes.length===0&&<div className="card"><p style={{color:'var(--text-light)',textAlign:'center',padding:'30px'}}>Aucune note confidentielle</p></div>}
      {confidentialNotes.map(n=><div key={n.id} className="confidential-note">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}><strong style={{fontSize:'14px'}}>{n.patientName}</strong><span style={{fontSize:'11px',color:'var(--text-light)'}}>{new Date(n.date).toLocaleDateString('fr-FR')} {new Date(n.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span></div>
        <p style={{fontSize:'13px',lineHeight:'1.6'}}>{n.content}</p>
        <p style={{fontSize:'11px',color:'var(--text-light)',marginTop:'8px'}}>— {n.doctorName}</p>
      </div>)}
    </div>)}

    {tab==='settings'&&(<div>
      <div className="page-header"><div><h1>Paramètres Système</h1></div></div>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',gap:'16px',marginBottom:'16px'}}>
          <img src={CLINIC.logo} alt="Logo" style={{width:'64px',height:'auto'}} onError={(e)=>{e.target.style.display='none'}}/>
          <div><h3 style={{marginBottom:'0'}}><i className="fas fa-hospital"></i> {CLINIC.name}</h3><p style={{fontSize:'11px',color:'var(--gold)',fontStyle:'italic'}}>{CLINIC.tagline}</p></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginTop:'12px'}}>
          <div><label style={{fontSize:'11px',color:'var(--text-light)',fontWeight:600}}>NOM</label><p style={{fontWeight:600}}>{CLINIC.name}</p></div>
          <div><label style={{fontSize:'11px',color:'var(--text-light)',fontWeight:600}}>ADRESSE</label><p>{CLINIC.address}</p></div>
          <div><label style={{fontSize:'11px',color:'var(--text-light)',fontWeight:600}}>DIRECTEUR</label><p>{CLINIC.director}</p></div>
          <div><label style={{fontSize:'11px',color:'var(--text-light)',fontWeight:600}}>TÉLÉPHONE</label><p>{CLINIC.phone}</p></div>
          <div><label style={{fontSize:'11px',color:'var(--text-light)',fontWeight:600}}>NIF</label><p style={{fontFamily:'monospace'}}>{CLINIC.nif}</p></div>
          <div><label style={{fontSize:'11px',color:'var(--text-light)',fontWeight:600}}>RCCM</label><p style={{fontFamily:'monospace'}}>{CLINIC.rccm}</p></div>
        </div>
      </div>
      <div className="card">
        <h3><i className="fas fa-palette"></i> Catégories d'Assurance</h3>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginTop:'8px'}}>{INSURANCE_TYPES.map(t=><span key={t} className="badge badge-gold" style={{fontSize:'13px',padding:'8px 16px'}}>{t}</span>)}</div>
        <p style={{fontSize:'12px',color:'var(--text-light)',marginTop:'12px'}}>
          <strong>Régulier:</strong> Paiement direct | <strong>CSU:</strong> Couverture Santé Universelle (maternité) | <strong>Academia:</strong> Couverture mensuelle | <strong>AMC:</strong> Assurance Maladie Complémentaire | <strong>Activa:</strong> Paiement à l'usage, facturation mensuelle
        </p>
      </div>
      <div className="card">
        <h3><i className="fas fa-code-branch"></i> Version Système</h3>
        <p style={{fontSize:'13px'}}>CRM Clinique The Grace of God v1.0<br/><span style={{color:'var(--text-light)',fontSize:'11px'}}>Développé sur mesure pour la gestion hospitalière complète</span></p>
      </div>
    </div>)}
  </DashLayout>);
}

// ============ PATIENT DOSSIER (tabbed medical chart) ============
function PatientDossier({patient,payments,labOrders,prescriptions,confidentialNotes,user,onClose}){
  const pPayments=(payments||[]).filter(p=>p.patientId===patient.id);
  const pLabs=(labOrders||[]).filter(l=>l.patientId===patient.id);
  const pRx=(prescriptions||[]).filter(r=>r.patientId===patient.id);
  const pNotes=(confidentialNotes||[]).filter(n=>n.patientId===patient.id);
  const canSeeNotes=user.role==='doctor'||user.role==='admin'||user.isSuperAdmin;
  const totalPaid=pPayments.reduce((s,p)=>s+p.amount,0);
  const [tab,setTab]=useState('demo');

  // ESC to close
  useEffect(()=>{const k=(e)=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',k);return()=>window.removeEventListener('keydown',k);},[onClose]);

  // Build timeline of all events sorted by date
  const timeline=[
    ...pPayments.map(p=>({...p,_type:'payment',_date:p.date,_icon:'fa-coins',_color:'var(--gold-500)'})),
    ...pLabs.map(l=>({...l,_type:'lab',_date:l.date,_icon:'fa-flask',_color:'var(--info-500)'})),
    ...pRx.map(r=>({...r,_type:'rx',_date:r.date,_icon:'fa-pills',_color:'var(--warning-500)'})),
    ...(canSeeNotes?pNotes.map(n=>({...n,_type:'note',_date:n.date,_icon:'fa-lock',_color:'var(--danger-500)'})):[]),
  ].sort((a,b)=>new Date(b._date)-new Date(a._date));

  const age=patient.dob?Math.floor((new Date()-new Date(patient.dob))/31557600000)+' ans':'—';

  const v = patient.vitals;
  const triageColor = (t)=> !t?'':t.includes('Rouge')?'var(--danger-500)':t.includes('Orange')?'#e07a1c':t.includes('Jaune')?'var(--warning-500)':t.includes('Vert')?'var(--success-500)':'var(--info-500)';

  const tabs=[
    {id:'demo',label:'Identité',icon:'fa-id-card'},
    {id:'vitals',label:'Vitaux',icon:'fa-heartbeat',count:v?1:0},
    {id:'labo',label:'Laboratoire',icon:'fa-flask',count:pLabs.length},
    {id:'rx',label:'Prescriptions',icon:'fa-pills',count:pRx.length},
    {id:'pay',label:'Paiements',icon:'fa-coins',count:pPayments.length},
    ...(canSeeNotes?[{id:'notes',label:'Notes',icon:'fa-lock',count:pNotes.length}]:[]),
    {id:'timeline',label:'Chronologie',icon:'fa-clock-rotate-left',count:timeline.length},
  ];

  return(<div className="dossier-overlay" onClick={(e)=>{if(e.target===e.currentTarget)onClose();}} role="dialog" aria-modal="true" aria-labelledby="dossier-title">
    <div className="dossier-panel">
      <div className="dossier-header">
        <div style={{display:'flex',alignItems:'center',gap:'14px',minWidth:0,flex:1}}>
          <PatientAvatar patient={patient} size="lg"/>
          <div style={{minWidth:0}}>
            <h2 id="dossier-title" style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{patient.nom} {patient.prenom}</h2>
            <div style={{fontSize:'12px',opacity:.75,marginTop:'4px',display:'flex',gap:'10px',flexWrap:'wrap'}}>
              <span><i className="fas fa-hashtag" style={{fontSize:'9px',opacity:.6,marginRight:'3px'}}></i><span style={{fontFamily:'ui-monospace,monospace'}}>{patient.id}</span></span>
              <span style={{opacity:.4}}>·</span>
              <span>{patient.sexe==='M'?'Masculin':patient.sexe==='F'?'Féminin':patient.sexe}</span>
              <span style={{opacity:.4}}>·</span>
              <span>{age}</span>
              <span style={{opacity:.4}}>·</span>
              <span><i className="fas fa-phone" style={{fontSize:'9px',opacity:.6,marginRight:'3px'}}></i>{patient.phone}</span>
            </div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <span className={`badge ${insuranceClass(patient.insurance)}`} style={{fontSize:'12px',padding:'5px 12px',background:'rgba(255,255,255,.15)',color:'#fff',boxShadow:'inset 0 0 0 1px rgba(255,255,255,.2)'}}><i className="fas fa-shield-halved" style={{fontSize:'10px'}}></i> {patient.insurance}</span>
          <button type="button" className="close-x" aria-label="Fermer" onClick={onClose}>×</button>
        </div>
      </div>

      <div className="dossier-tabs" role="tablist">
        {tabs.map(t=><div key={t.id} role="tab" aria-selected={tab===t.id} tabIndex={0} className={`dossier-tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)} onKeyDown={(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();setTab(t.id);}}}>
          <i className={`fas ${t.icon}`} aria-hidden="true"></i> {t.label} {t.count>0&&<span className="ct">{t.count}</span>}
        </div>)}
      </div>

      <div className="dossier-body">
        {/* PATIENT FLOW ALWAYS VISIBLE */}
        <div className="dossier-section" style={{padding:'14px 16px'}}>
          <div className="patient-flow" style={{margin:0}}>{STEPS.map((s,i)=><span key={i} className={`flow-step ${i<patient.step?'done':''} ${i===patient.step?'current':''}`}>{s}</span>)}</div>
        </div>

        {/* DEMOGRAPHICS */}
        {tab==='demo'&&<div className="dossier-section">
          <h4><i className="fas fa-id-card"></i> Informations Personnelles</h4>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'14px',fontSize:'13px'}}>
            <Field label="Nom complet" value={`${patient.nom} ${patient.prenom}`}/>
            <Field label="Sexe" value={patient.sexe==='M'?'Masculin':'Féminin'}/>
            <Field label="Âge" value={age}/>
            <Field label="Téléphone" value={patient.phone}/>
            <Field label="Email" value={patient.email||'—'}/>
            <Field label="Adresse" value={patient.adresse||'—'}/>
            <Field label="Langue préférée" value={patient.langue||'Français'}/>
            <Field label="Catégorie d'assurance" value={<span className={`badge ${insuranceClass(patient.insurance)}`} style={{padding:'4px 10px'}}>{patient.insurance}</span>}/>
            <Field label="Médecin référent" value={patient.doctorName||<span style={{color:'var(--text-muted)'}}>Non assigné</span>}/>
            <Field label="Motif de visite" value={patient.motif||'—'}/>
            <Field label="Enregistré le" value={new Date(patient.registeredAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})}/>
            <Field label="Par" value={patient.registeredBy||'—'}/>
          </div>
          {patient.diagnosis&&<div style={{marginTop:'18px',padding:'14px 18px',background:'var(--primary-50)',borderRadius:'var(--r-md)',borderLeft:'3px solid var(--primary-500)'}}>
            <div style={{fontSize:'10px',fontWeight:700,color:'var(--primary-700)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'4px'}}><i className="fas fa-stethoscope"></i> Diagnostic</div>
            <div style={{fontSize:'14px',fontWeight:500,color:'var(--text)'}}>{patient.diagnosis}</div>
          </div>}
        </div>}

        {/* VITALS */}
        {tab==='vitals'&&<div className="dossier-section">
          <h4><i className="fas fa-heartbeat"></i> Signes Vitaux</h4>
          {!v&&<div className="empty-state" style={{padding:'40px 20px'}}>
            <div className="empty-state-icon"><i className="fas fa-heart-pulse"></i></div>
            <div className="empty-state-title">Vitaux non enregistrés</div>
            <div className="empty-state-body">Les signes vitaux seront saisis par l'infirmier·ère lors du passage du patient.</div>
          </div>}
          {v&&<>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:'10px'}}>
              <VitalGauge icon="fa-thermometer-half" label="Température" value={v.temp} unit="°C"/>
              <VitalGauge icon="fa-heart" label="Tension" value={v.tension}/>
              <VitalGauge icon="fa-weight-scale" label="Poids" value={v.poids} unit="kg"/>
              <VitalGauge icon="fa-ruler-vertical" label="Taille" value={v.taille} unit="cm"/>
              <VitalGauge icon="fa-wave-square" label="Pouls" value={v.pouls} unit="bpm"/>
              <VitalGauge icon="fa-lungs" label="SpO₂" value={v.spo2} unit="%"/>
            </div>
            {v.triage&&<div style={{marginTop:'16px',padding:'12px 16px',borderRadius:'var(--r-md)',background:'var(--ink-25)',border:'1px solid var(--border-subtle)',display:'flex',alignItems:'center',gap:'12px'}}>
              <div style={{width:'10px',height:'10px',borderRadius:'50%',background:triageColor(v.triage),boxShadow:`0 0 0 4px ${triageColor(v.triage)}22`}}></div>
              <div>
                <div style={{fontSize:'10px',fontWeight:700,color:'var(--text-light)',textTransform:'uppercase',letterSpacing:'1px'}}>Classification triage</div>
                <div style={{fontSize:'14px',fontWeight:600,color:'var(--text)',marginTop:'2px'}}>{v.triage}</div>
              </div>
            </div>}
          </>}
        </div>}

        {/* LAB */}
        {tab==='labo'&&<div className="dossier-section">
          <h4><i className="fas fa-flask"></i> Examens de Laboratoire</h4>
          {pLabs.length===0&&<div className="empty-state" style={{padding:'30px 20px'}}>
            <div className="empty-state-icon"><i className="fas fa-flask"></i></div>
            <div className="empty-state-title">Aucun examen</div>
            <div className="empty-state-body">Aucun examen de laboratoire n'a été prescrit pour ce patient.</div>
          </div>}
          {pLabs.map(l=><div key={l.id} style={{padding:'14px 16px',background:l.status==='completed'?'var(--success-50)':'var(--warning-50)',borderRadius:'var(--r-md)',marginBottom:'10px',border:'1px solid '+(l.status==='completed'?'var(--success-100)':'var(--warning-100)'),borderLeft:`3px solid ${l.status==='completed'?'var(--success-500)':'var(--warning-500)'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
              <strong style={{fontSize:'13.5px'}}>{l.description}</strong>
              <span className={`badge ${l.status==='completed'?'badge-green':'badge-yellow'}`}>{l.status==='completed'?<><i className="fas fa-check"></i> Complété</>:<><i className="fas fa-hourglass-half"></i> En attente</>}</span>
            </div>
            {l.results&&<div style={{marginTop:'10px',fontSize:'13px',padding:'10px 12px',background:'var(--surface)',borderRadius:'var(--r-sm)',border:'1px solid var(--border-subtle)',lineHeight:1.6}}><strong style={{color:'var(--primary-700)'}}>Résultats :</strong> {l.results}</div>}
            <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'8px',display:'flex',gap:'10px',flexWrap:'wrap'}}>
              <span><i className="fas fa-user-doctor" style={{opacity:.5,marginRight:'4px'}}></i>{l.orderedBy}</span>
              <span style={{opacity:.4}}>·</span>
              <span><i className="fas fa-calendar" style={{opacity:.5,marginRight:'4px'}}></i>{new Date(l.date).toLocaleString('fr-FR')}</span>
              {l.completedBy&&<><span style={{opacity:.4}}>·</span><span><i className="fas fa-flask" style={{opacity:.5,marginRight:'4px'}}></i>Traité par {l.completedBy}</span></>}
            </div>
          </div>)}
        </div>}

        {/* RX */}
        {tab==='rx'&&<div className="dossier-section">
          <h4><i className="fas fa-pills"></i> Prescriptions</h4>
          {pRx.length===0&&<div className="empty-state" style={{padding:'30px 20px'}}>
            <div className="empty-state-icon"><i className="fas fa-prescription-bottle"></i></div>
            <div className="empty-state-title">Aucune prescription</div>
            <div className="empty-state-body">Aucun médicament n'a été prescrit pour ce patient.</div>
          </div>}
          {pRx.map(r=><div key={r.id} style={{padding:'14px 16px',background:r.dispensed?'var(--success-50)':'var(--warning-50)',borderRadius:'var(--r-md)',marginBottom:'10px',border:'1px solid '+(r.dispensed?'var(--success-100)':'var(--warning-100)'),borderLeft:`3px solid ${r.dispensed?'var(--success-500)':'var(--warning-500)'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'12px',flexWrap:'wrap'}}>
              <div style={{fontSize:'13.5px',fontWeight:500,lineHeight:1.5,flex:1}}>{r.content}</div>
              <span className={`badge ${r.dispensed?'badge-green':'badge-yellow'}`}>{r.dispensed?<><i className="fas fa-check"></i> Dispensé</>:<><i className="fas fa-hourglass-half"></i> En attente</>}</span>
            </div>
            <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'8px',display:'flex',gap:'10px',flexWrap:'wrap'}}>
              <span><i className="fas fa-user-doctor" style={{opacity:.5,marginRight:'4px'}}></i>{r.prescribedBy}</span>
              <span style={{opacity:.4}}>·</span>
              <span>{new Date(r.date).toLocaleString('fr-FR')}</span>
              {r.dispensedAt&&<><span style={{opacity:.4}}>·</span><span>Dispensé à {new Date(r.dispensedAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span></>}
            </div>
          </div>)}
        </div>}

        {/* PAYMENTS */}
        {tab==='pay'&&<div className="dossier-section">
          <h4><i className="fas fa-coins"></i> Paiements <span style={{marginLeft:'auto',fontSize:'13px',fontWeight:700,color:'var(--gold-600)',textTransform:'none',letterSpacing:0}}>Total : {fmt(totalPaid)}</span></h4>
          {pPayments.length===0&&<div className="empty-state" style={{padding:'30px 20px'}}>
            <div className="empty-state-icon"><i className="fas fa-receipt"></i></div>
            <div className="empty-state-title">Aucun paiement</div>
            <div className="empty-state-body">Aucune transaction enregistrée pour ce patient.</div>
          </div>}
          {pPayments.length>0&&<table style={{fontSize:'12.5px'}}><thead><tr><th>Date</th><th>Description</th><th className="num">Montant</th><th>Caissier</th></tr></thead><tbody>
          {pPayments.map(p=><tr key={p.id}>
            <td style={{whiteSpace:'nowrap'}}>{new Date(p.date).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
            <td>{p.description}</td>
            <td className="num" style={{fontWeight:700,color:'var(--primary-700)'}}>{fmt(p.amount)}</td>
            <td>{p.processedBy}</td>
          </tr>)}
          </tbody></table>}
        </div>}

        {/* NOTES */}
        {tab==='notes'&&canSeeNotes&&<div className="dossier-section">
          <h4><i className="fas fa-lock"></i> Notes Confidentielles</h4>
          {pNotes.length===0&&<div className="empty-state" style={{padding:'30px 20px'}}>
            <div className="empty-state-icon"><i className="fas fa-shield-halved"></i></div>
            <div className="empty-state-title">Aucune note confidentielle</div>
            <div className="empty-state-body">Les notes confidentielles ne sont visibles que par le médecin référent et l'administrateur.</div>
          </div>}
          {pNotes.map(n=><div key={n.id} className="confidential-note">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><strong style={{fontSize:'13px'}}>{n.doctorName}</strong><span style={{fontSize:'10.5px',color:'var(--gold-600)',fontWeight:500}}>{new Date(n.date).toLocaleString('fr-FR')}</span></div>
            <p style={{marginTop:'6px',fontSize:'13px',lineHeight:1.6}}>{n.content}</p>
          </div>)}
        </div>}

        {/* TIMELINE */}
        {tab==='timeline'&&<div className="dossier-section">
          <h4><i className="fas fa-clock-rotate-left"></i> Chronologie Complète</h4>
          {timeline.length===0&&<div className="empty-state" style={{padding:'30px 20px'}}>
            <div className="empty-state-icon"><i className="fas fa-clock"></i></div>
            <div className="empty-state-title">Aucun événement</div>
            <div className="empty-state-body">Les événements (paiements, examens, prescriptions) apparaîtront ici au fil du parcours.</div>
          </div>}
          <div style={{paddingLeft:'4px'}}>
            {timeline.map((e,i)=><div key={i} className={`timeline-item ${e._type}`}>
              <div style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'13px'}}>
                <i className={`fas ${e._icon}`} style={{color:e._color,width:'14px'}} aria-hidden="true"></i>
                <span style={{fontWeight:600,color:'var(--text)'}}>{e._type==='payment'?`Paiement de ${fmt(e.amount)} — ${e.description}`:e._type==='lab'?`Labo : ${e.description}${e.results?' → '+e.results.substring(0,80):''}`:e._type==='rx'?`Rx : ${e.content}`:e._type==='note'?`Note : ${e.content.substring(0,80)}...`:''}</span>
              </div>
              <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'4px',marginLeft:'22px'}}>{new Date(e._date).toLocaleString('fr-FR')}</div>
            </div>)}
          </div>
        </div>}
      </div>
    </div>
  </div>);
}

function Field({label,value}){return(<div>
  <div style={{fontSize:'10px',fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:'4px'}}>{label}</div>
  <div style={{fontSize:'13px',color:'var(--text)',fontWeight:500}}>{value}</div>
</div>);}

function VitalGauge({icon,label,value,unit}){return(<div className="vital-gauge">
  <div className="vlabel"><i className={`fas ${icon}`} aria-hidden="true"></i> {label}</div>
  <div className="vvalue">{value||'—'}{unit&&value&&<span className="vunit">{unit}</span>}</div>
</div>);}

// ============ AI ASSISTANT ============
function AIAssistant({user}){
  const [open,setOpen]=useState(false);
  const [msgs,setMsgs]=useState([{role:'bot',text:`${getTimeGreeting()} ${user.name}! Je suis l'assistant IA de la clinique. Je peux vous aider avec des questions médicales, administratives ou techniques. Comment puis-je vous aider?`}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [pos,setPos]=useState({x:window.innerWidth-80,y:window.innerHeight-80});
  const [dragging,setDragging]=useState(false);
  const [hasDragged,setHasDragged]=useState(false);
  const offsetRef=useRef({x:0,y:0});
  const bodyRef=useRef(null);

  const onMouseDown=(e)=>{
    setDragging(true);setHasDragged(false);
    offsetRef.current={x:e.clientX-pos.x,y:e.clientY-pos.y};
  };

  useEffect(()=>{
    const onMove=(e)=>{if(dragging){setHasDragged(true);setPos({x:Math.max(0,Math.min(window.innerWidth-60,e.clientX-offsetRef.current.x)),y:Math.max(0,Math.min(window.innerHeight-60,e.clientY-offsetRef.current.y))});}};
    const onUp=()=>setDragging(false);
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
  },[dragging]);

  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[msgs]);

  const handleClick=()=>{if(!hasDragged)setOpen(!open);};

  const AI_KEY = window.__AI_KEY || '';
  const sendMsg=async()=>{
    if(!input.trim()||loading)return;
    const userMsg={role:'user',text:input};
    setMsgs(m=>[...m,userMsg]);setInput('');setLoading(true);
    if(!AI_KEY){
      setTimeout(()=>{
        setMsgs(m=>[...m,{role:'bot',text:'L\'assistant IA n\'est pas configuré. Contactez l\'administrateur pour activer cette fonctionnalité.'}]);
        setLoading(false);
      },500);
      return;
    }
    try{
      const res=await fetch('https://openrouter.ai/api/v1/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${AI_KEY}`},
        body:JSON.stringify({model:'google/gemini-2.0-flash-001',messages:[{role:'system',content:`Tu es l'assistant IA de ${CLINIC.name} à Kinshasa, RDC. Tu aides le personnel médical (utilisateur actuel: ${user.name}, rôle: ${user.title}). Réponds en français de manière concise et professionnelle. Tu connais le système CRM, les protocoles médicaux, et tu peux aider avec des questions sur les médicaments, diagnostics, et procédures administratives.`},{role:'user',content:input}]})
      });
      const data=await res.json();
      setMsgs(m=>[...m,{role:'bot',text:data.choices?.[0]?.message?.content||'Désolé, erreur de traitement.'}]);
    }catch(e){setMsgs(m=>[...m,{role:'bot',text:'Erreur de connexion. Vérifiez votre internet.'}]);}
    setLoading(false);
  };

  return(<>
    <div className="ai-fab" style={{left:pos.x,top:pos.y}} onMouseDown={onMouseDown} onClick={handleClick} title="Assistant IA">
      <i className={`fas ${open?'fa-times':'fa-robot'}`}></i>
    </div>
    {open&&<div className="ai-panel">
      <div className="ai-panel-header"><span><i className="fas fa-robot"></i> Assistant IA — Grace of God</span><span style={{cursor:'pointer',fontSize:'18px'}} onClick={()=>setOpen(false)}>×</span></div>
      <div className="ai-panel-body" ref={bodyRef}>
        {msgs.map((m,i)=><div key={i} className={`ai-msg ${m.role==='user'?'user':'bot'}`}>{m.text}</div>)}
        {loading&&<div className="ai-msg bot"><i className="fas fa-spinner fa-spin"></i> Réflexion...</div>}
      </div>
      <div className="ai-panel-input">
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')sendMsg()}} placeholder="Posez votre question..." disabled={loading}/>
        <button className="btn btn-sm btn-primary" onClick={sendMsg} disabled={loading}><i className="fas fa-paper-plane"></i></button>
      </div>
    </div>}
  </>);
}

// ============ RENDER ============
ReactDOM.render(<ToastProvider><App/></ToastProvider>,document.getElementById('root'));
